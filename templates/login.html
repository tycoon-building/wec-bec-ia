<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WEC‑BEC English AI – Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0f1c 0%, #0f172a 50%, #1a1a2e 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Bandes diagonales du drapeau du Congo en fond */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg,
                rgba(0, 128, 0, 0.06) 0px, rgba(0, 128, 0, 0.06) 120px,
                rgba(255, 215, 0, 0.06) 120px, rgba(255, 215, 0, 0.06) 240px,
                rgba(255, 0, 0, 0.06) 240px, rgba(255, 0, 0, 0.06) 360px);
            pointer-events: none;
            z-index: 0;
        }

        /* Particles animation */
        .particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0.5; }
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 460px;
            padding: 48px 40px 44px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 0, 0.2);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: cardAppear 0.6s ease-out;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 50px 90px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.4);
        }

        /* Logo container avec effet Congo */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }
        .logo {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }
        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 45px rgba(255, 215, 0, 0.4);
            border-color: #ffd700;
        }
        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            border-radius: 35px;
            background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .logo-container:hover .logo-glow {
            opacity: 1;
        }

        h2 {
            color: #ffffff;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.8px;
            margin-top: 8px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #008000, #ffd700, #ff0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .creator {
            color: rgba(255, 215, 0, 0.9);
            font-size: 0.8rem;
            margin-bottom: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .creator i {
            color: #ffd700;
            font-size: 14px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
            margin-bottom: 32px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .subtitle i {
            color: #ffd700;
            font-size: 14px;
        }

        /* Info compte aide */
        .account-help {
            background: rgba(0, 128, 0, 0.15);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        .account-help p {
            color: #94a3b8;
            font-size: 0.7rem;
            margin-bottom: 6px;
        }
        .account-help .demo-accounts {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            font-size: 0.65rem;
        }
        .demo-accounts span {
            background: rgba(255, 215, 0, 0.15);
            padding: 3px 8px;
            border-radius: 12px;
            color: #ffd700;
            cursor: pointer;
            transition: 0.2s;
        }
        .demo-accounts span:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        /* Mini galerie d'images */
        .mini-gallery {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .mini-gallery-item {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }
        .mini-gallery-item:hover {
            transform: scale(1.08);
            border-color: #ffd700;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        .mini-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 6px;
            margin-left: 8px;
        }

        .input-group input {
            width: 100%;
            height: 54px;
            padding: 0 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 18px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffd700;
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.2);
        }

        .input-group i {
            position: absolute;
            right: 18px;
            bottom: 18px;
            color: rgba(255, 215, 0, 0.6);
            font-size: 18px;
            pointer-events: none;
        }

        .btn-login {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #008000, #ffd700, #ff0000);
            color: #1a1a2e;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(0, 128, 0, 0.35);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(255, 215, 0, 0.55);
            filter: brightness(1.05);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border-left: 3px solid #ef4444;
            padding: 12px 16px;
            border-radius: 14px;
            color: #fca5a5;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: left;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 1;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
        }

        /* Modal pour agrandir les images */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .image-modal.active {
            display: flex;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: #ffd700;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-modal:hover {
            transform: scale(1.1);
            color: #ff0000;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 36px;
                margin: 20px;
                max-width: calc(100% - 40px);
                border-radius: 32px;
            }
            .logo {
                width: 80px;
                height: 80px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .btn-login {
                height: 50px;
            }
            .mini-gallery-item {
                width: 50px;
                height: 50px;
            }
            .account-help {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="/static/images/logo.jpg" alt="WEC-BEC Logo" class="logo" onerror="this.src='https://placehold.co/110x110/008000/white?text=WEC'">
            <div class="logo-glow"></div>
        </div>

        <h2>WEC‑BEC</h2>

        <div class="creator">
            <i class="fas fa-crown"></i> Created by Mr Tycoon
            <i class="fas fa-crown"></i>
        </div>

        <p class="subtitle">
            <i class="fas fa-language"></i> English AI Learning Platform
            <i class="fas fa-microphone-alt"></i>
            <i class="fas fa-robot"></i>
        </p>

        <!-- Mini galerie des photos -->
        <div class="mini-gallery">
            <div class="mini-gallery-item" onclick="openImageModal('/static/images/logo.jpg')">
                <img src="/static/images/logo.jpg" alt="Logo" onerror="this.src='https://placehold.co/60x60/008000/white?text=W'">
            </div>
            <div class="mini-gallery-item" onclick="openImageModal('/static/images/photo1.jpg')">
                <img src="/static/images/photo1.jpg" alt="Congo 1" onerror="this.src='https://placehold.co/60x60/008000/white?text=1'">
            </div>
            <div class="mini-gallery-item" onclick="openImageModal('/static/images/photo2.jpg')">
                <img src="/static/images/photo2.jpg" alt="Congo 2" onerror="this.src='https://placehold.co/60x60/ffd700/white?text=2'">
            </div>
            <div class="mini-gallery-item" onclick="openImageModal('/static/images/photo3.jpg')">
                <img src="/static/images/photo3.jpg" alt="Congo 3" onerror="this.src='https://placehold.co/60x60/ff0000/white?text=3'">
            </div>
            <div class="mini-gallery-item" onclick="openImageModal('/static/images/photo4.jpg')">
                <img src="/static/images/photo4.jpg" alt="Congo 4" onerror="this.src='https://placehold.co/60x60/ffd700/white?text=4'">
            </div>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="emailInput" placeholder="ex: apprenant1@gmail.com" required autocomplete="email">
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Mot de passe</label>
                <input type="password" name="password" id="passwordInput" placeholder="••••••••" required autocomplete="current-password">
                <i class="fas fa-key"></i>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Se connecter
            </button>
        </form>
    </div>

    <div class="footer">
        <i class="fas fa-copyright"></i> 2025 WEC-BEC English Academy — Created by Mr Tycoon | Learn with AI
    </div>

    <!-- Modal pour agrandir les images -->
    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="close-modal">&times;</span>
        <img id="modalImage" src="" alt="Agrandissement">
    </div>

    <script>
        // ========== PARTICLES ==========
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            const particleCount = window.innerWidth < 768 ? 40 : 80;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 5 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 15 + 10 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.background = `rgba(255, 215, 0, ${0.15 + Math.random() * 0.3})`;
                container.appendChild(particle);
            }
        }

        // ========== REMPLIR AUTO LES IDENTIFIANTS ==========
        function fillCredentials(email, password) {
            document.getElementById('emailInput').value = email;
            document.getElementById('passwordInput').value = password;
            // Optionnel : mettre en évidence
            const emailField = document.getElementById('emailInput');
            emailField.style.borderColor = '#ffd700';
            setTimeout(() => { emailField.style.borderColor = ''; }, 1000);
        }

        // ========== MODAL IMAGE ==========
        function openImageModal(imageSrc) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.classList.add('active');
            modalImg.src = imageSrc;
        }

        function closeImageModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
        }

        // Fermer avec la touche Echap
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeImageModal();
            }
        });

        window.addEventListener('load', () => {
            createParticles();
        });
    </script>
</body>
</html>
