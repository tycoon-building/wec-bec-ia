<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WEC‑BEC English AI – Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e14;
            background-image: url('static/images/photo1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            animation: bgZoom 20s ease infinite alternate;
        }

        @keyframes bgZoom {
            0% { background-size: 100% auto; }
            100% { background-size: 110% auto; }
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                rgba(0, 0, 0, 0.65) 0%,
                rgba(0, 0, 0, 0.5) 50%,
                rgba(0, 0, 0, 0.65) 100%);
            backdrop-filter: blur(8px);
            z-index: 0;
        }

        /* Particles animation */
        .particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            background: rgba(108, 99, 255, 0.3);
            border-radius: 50%;
            animation: float linear infinite;
        }
        @keyframes float {
            from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            to { transform: translateY(-100vh) rotate(360deg); opacity: 0.6; }
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            padding: 48px 40px 44px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 50px 90px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(108, 99, 255, 0.3);
        }

        /* Logo container with glow */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 16px;
        }
        .logo {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            object-fit: cover;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 45px rgba(108, 99, 255, 0.4);
        }
        .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130px;
            height: 130px;
            border-radius: 35px;
            background: radial-gradient(circle, rgba(108,99,255,0.3) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .logo-container:hover .logo-glow {
            opacity: 1;
        }

        h2 {
            color: #ffffff;
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.8px;
            margin-top: 8px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.9rem;
            margin-bottom: 36px;
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .subtitle i {
            color: #6c63ff;
            font-size: 14px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 6px;
            margin-left: 8px;
        }

        .input-group input {
            width: 100%;
            height: 54px;
            padding: 0 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #6c63ff;
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.2);
        }

        /* Icon inside input */
        .input-group i {
            position: absolute;
            right: 18px;
            bottom: 18px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 18px;
            pointer-events: none;
        }

        .btn-login {
            width: 100%;
            height: 54px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            color: #ffffff;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35);
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(108, 99, 255, 0.55);
            background: linear-gradient(135deg, #7c73ff, #b865ff);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border-left: 3px solid #ef4444;
            padding: 12px 16px;
            border-radius: 14px;
            color: #fca5a5;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: left;
        }


        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 1;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.7rem;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px 36px;
                margin: 20px;
                max-width: calc(100% - 40px);
                border-radius: 32px;
            }
            .logo {
                width: 80px;
                height: 80px;
            }
            h2 {
                font-size: 1.5rem;
            }
            .btn-login {
                height: 50px;
            }
        }

        @media (max-width: 380px) {
            .login-card {
                padding: 24px 20px 28px;
            }
        }
    </style>
</head>
<body>

    <!-- Floating particles -->
    <div class="particles" id="particles"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="static/images/logo.jpg" alt="WEC-BEC Logo" class="logo">
            <div class="logo-glow"></div>
        </div>

        <h2>🎓 WEC‑BEC</h2>
        <p class="subtitle">
            <i class="fas fa-language"></i> English AI Learning Platform
            <i class="fas fa-microphone-alt"></i>
        </p>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" placeholder="student1@gmail.com" required autocomplete="email">
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                <i class="fas fa-key"></i>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket"></i> Se connecter
            </button>
        </form>
    </div>

    <div class="footer">
        <i class="fas fa-copyright"></i> 2025 WEC-BEC English Academy — Learn with AI
    </div>

    <script>
        // Create floating particles for visual effect
        function createParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            const particleCount = window.innerWidth < 768 ? 30 : 60;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = Math.random() * 15 + 8 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.background = `rgba(${100 + Math.random() * 100}, ${80 + Math.random() * 80}, 255, ${0.1 + Math.random() * 0.3})`;
                container.appendChild(particle);
            }
        }

        window.addEventListener('load', () => {
            createParticles();
        });
    </script>
</body>
</html>
