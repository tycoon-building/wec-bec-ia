<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEC-BEC English AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:10px;
            background:url('static/images/photo2.jpg') no-repeat center center fixed;
            background-size:cover;
            position:relative;
        }

        body::before{
            content:'';
            position:fixed;
            inset:0;
            background:rgba(15,23,42,0.72);
            backdrop-filter:blur(2px);
            z-index:0;
        }

        .container{
            position:relative;
            z-index:1;
            width:100%;
            max-width:760px;
            height:95vh;
            display:flex;
            flex-direction:column;
            background:rgba(255,255,255,0.92);
            backdrop-filter:blur(18px);
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 20px 70px rgba(0,0,0,0.35);
        }

        /* HEADER */

        .header{
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            color:white;
            padding:18px 20px;
            display:flex;
            align-items:center;
            gap:14px;
            flex-wrap:wrap;
        }

        .header-logo{
            width:48px;
            height:48px;
            border-radius:14px;
            object-fit:cover;
            box-shadow:0 4px 14px rgba(0,0,0,0.3);
        }

        .header-text{
            flex:1;
            min-width:160px;
        }

        .header-text h1{
            font-size:22px;
            font-weight:700;
        }

        .header-text p{
            font-size:13px;
            opacity:0.8;
            margin-top:2px;
        }

        .logout-btn{
            background:#ef4444;
            color:white;
            text-decoration:none;
            padding:10px 16px;
            border-radius:999px;
            font-size:14px;
            font-weight:600;
            transition:0.25s;
            white-space:nowrap;
        }

        .logout-btn:hover{
            background:#dc2626;
            transform:translateY(-1px);
        }

        /* CHAT */

        #chat{
            flex:1;
            overflow-y:auto;
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:14px;
            scroll-behavior:smooth;
        }

        #chat::-webkit-scrollbar{
            width:6px;
        }

        #chat::-webkit-scrollbar-thumb{
            background:#cbd5e1;
            border-radius:20px;
        }

        .msg{
            padding:14px 18px;
            border-radius:20px;
            line-height:1.6;
            max-width:88%;
            font-size:15px;
            animation:fadeIn 0.25s ease;
            word-wrap:break-word;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(8px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .user{
            margin-left:auto;
            background:linear-gradient(135deg,#2563eb,#3b82f6);
            color:white;
            border-bottom-right-radius:8px;
            box-shadow:0 8px 20px rgba(37,99,235,0.25);
        }

        .bot{
            background:white;
            border:1px solid #e2e8f0;
            color:#0f172a;
            border-bottom-left-radius:8px;
            box-shadow:0 6px 20px rgba(0,0,0,0.06);
        }

        /* INPUT ZONE */

        .zone{
            padding:16px;
            border-top:1px solid rgba(0,0,0,0.06);
            background:rgba(255,255,255,0.75);
            display:flex;
            gap:10px;
            align-items:center;
            flex-wrap:wrap;
        }

        .zone input{
            flex:1;
            min-width:180px;
            border:none;
            outline:none;
            padding:16px 18px;
            border-radius:999px;
            background:#f1f5f9;
            font-size:16px;
            transition:0.2s;
        }

        .zone input:focus{
            background:white;
            box-shadow:0 0 0 3px rgba(59,130,246,0.15);
        }

        .zone button{
            border:none;
            border-radius:999px;
            padding:14px 18px;
            cursor:pointer;
            font-weight:600;
            min-height:52px;
            min-width:95px;
            transition:0.25s;
            font-size:14px;
        }

        .zone button:hover{
            transform:translateY(-1px);
        }

        .btn-send{
            background:#2563eb;
            color:white;
        }

        .btn-send:hover{
            background:#1d4ed8;
        }

        .btn-mic{
            background:#ef4444;
            color:white;
        }

        .btn-mic:hover{
            background:#dc2626;
        }

        .btn-stop{
            background:#0f172a;
            color:white;
        }

        .btn-stop:hover{
            background:#1e293b;
        }

        /* STATUS */

        .status{
            font-size:13px;
            padding:0 20px 12px;
            color:#64748b;
        }

        /* MOBILE */

        @media(max-width:768px){

            body{
                padding:0;
            }

            .container{
                height:100vh;
                max-width:100%;
                border-radius:0;
            }

            .header{
                padding:14px;
            }

            .header-logo{
                width:42px;
                height:42px;
            }

            .header-text h1{
                font-size:18px;
            }

            .header-text p{
                font-size:12px;
            }

            #chat{
                padding:14px;
            }

            .msg{
                max-width:95%;
                font-size:14px;
            }

            .zone{
                flex-direction:column;
                padding:12px;
            }

            .zone input{
                width:100%;
            }

            .zone button{
                width:100%;
            }

            .logout-btn{
                width:100%;
                text-align:center;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->

    <div class="header">

        <img src="static/images/logo.jpg" class="header-logo">

        <div class="header-text">
            <h1>WEC-BEC English AI</h1>
            <p>Connected as: {{ user }}</p>
        </div>

        <a href="/logout" class="logout-btn">
            Logout
        </a>

    </div>

    <!-- CHAT -->

    <div id="chat"></div>

    <div class="status" id="status">
        Ready 🎤
    </div>

    <!-- INPUT -->

    <div class="zone">

        <input
            id="msg"
            placeholder="Type or speak in English..."
            autocomplete="off"
        >

        <button class="btn-send" onclick="sendMessage()">
            Send
        </button>

        <button class="btn-mic" onclick="startVoice()">
            Speak
        </button>

        <button class="btn-stop" onclick="stopVoice()">
            Stop
        </button>

    </div>

</div>

<script>

let voiceMode = false;
let recognition = null;
let speaking = false;
let isListening = false;

const statusText = document.getElementById("status");

function setStatus(text){
    statusText.innerText = text;
}

function getHumanVoice() {

    const voices = speechSynthesis.getVoices();

    let preferred =
        voices.find(v => v.name.includes("Samantha")) ||
        voices.find(v => v.name.includes("Google US English")) ||
        voices.find(v => v.name.includes("Jenny")) ||
        voices.find(v => v.name.includes("Zira")) ||
        voices.find(v => v.name.includes("Aria")) ||
        voices.find(v => v.lang.includes("en"));

    return preferred;
}

function speak(text){

    window.speechSynthesis.cancel();

    speaking = true;

    setStatus("Speaking... 🔊");

    let speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";

    // voix plus humaine
    speech.rate = 0.92;
    speech.pitch = 1.05;
    speech.volume = 1;

    let selectedVoice = getHumanVoice();

    if(selectedVoice){
        speech.voice = selectedVoice;
    }

    speech.onstart = () => {

        if(recognition && isListening){
            recognition.stop();
            isListening = false;
        }
    };

    speech.onend = () => {

        speaking = false;

        setStatus("Ready 🎤");

        if(voiceMode){

            setTimeout(() => {
                startListening();
            },700);
        }
    };

    speechSynthesis.speak(speech);
}

async function sendMessage(textFromVoice = null){

    const input = document.getElementById("msg");

    const message = textFromVoice ?? input.value;

    if(!message.trim()) return;

    const chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="msg user">
            <b>You:</b> ${message}
        </div>
    `;

    input.value = "";

    chat.scrollTop = chat.scrollHeight;

    setStatus("Thinking... 🤖");

    try{

        const res = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({message})
        });

        const data = await res.json();

        chat.innerHTML += `
            <div class="msg bot">
                <b>Teacher:</b> ${data.reply}
            </div>
        `;

        chat.scrollTop = chat.scrollHeight;

        speak(data.reply);

    }catch(err){

        chat.innerHTML += `
            <div class="msg bot">
                <b>Error:</b> Server problem.
            </div>
        `;

        setStatus("Connection error ❌");
    }
}

function startListening(){

    if(speaking || isListening) return;

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if(!SpeechRecognition){

        alert("Speech recognition not supported.");

        return;
    }

    recognition = new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = false;

    recognition.interimResults = false;

    recognition.maxAlternatives = 1;

    recognition.onstart = () => {

        isListening = true;

        setStatus("Listening... 🎤");
    };

    recognition.onresult = async (e) => {

        const text = e.results[0][0].transcript;

        recognition.stop();

        isListening = false;

        await sendMessage(text);
    };

    recognition.onerror = (e) => {

        console.log(e.error);

        isListening = false;

        setStatus("Microphone error ❌");

        if(voiceMode){

            setTimeout(() => {
                startListening();
            },1500);
        }
    };

    recognition.onend = () => {

        isListening = false;

        if(voiceMode && !speaking){

            setTimeout(() => {
                startListening();
            },1000);
        }
    };

    recognition.start();
}

function startVoice(){

    voiceMode = true;

    setStatus("Voice mode activated 🎤");

    startListening();
}

function stopVoice(){

    voiceMode = false;

    speaking = false;

    isListening = false;

    if(recognition){
        recognition.stop();
    }

    speechSynthesis.cancel();

    setStatus("Voice stopped ⛔");
}

window.speechSynthesis.onvoiceschanged = () => {
    getHumanVoice();
};

</script>

</body>
</html>
