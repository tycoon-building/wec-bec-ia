<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WEC-BEC English AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 30%, #1a1a2e 100%);
            overflow: hidden;
            touch-action: pan-x pan-y;
        }
        .app {
            width: 100%;
            max-width: 1000px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 0 1px rgba(255,215,0,0.2);
        }
        @media (min-width: 1000px) { .app { height: 95vh; margin: 2vh auto; border-radius: 42px; } }
        .header {
            background: linear-gradient(135deg, #008000, #ffd700, #ff0000);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header-logo { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid #ffd700; background: white; flex-shrink: 0; }
        .header-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-text { flex: 1; }
        .header-text h1 { font-size: 18px; color: white; }
        .header-text p { font-size: 10px; color: rgba(255,255,255,0.8); }
        .streak-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 4px 12px; border-radius: 40px; font-weight: 700; font-size: 11px; color: white; white-space: nowrap; }
        .logout-btn { background: rgba(0,0,0,0.3); color: white; padding: 6px 14px; border-radius: 40px; text-decoration: none; font-size: 11px; font-weight: 600; }
        .nav { display: flex; background: rgba(0,0,0,0.4); padding: 0 8px; gap: 4px; flex-shrink: 0; }
        .nav button { flex: 1; padding: 10px 8px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 600; font-size: 13px; cursor: pointer; }
        .nav button.active { color: #ffd700; border-bottom: 2px solid #ffd700; }
        .main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .section { display: none; }
        .section.active { display: block; }
        #chat-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; max-height: 60vh; overflow-y: auto; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { margin-left: auto; background: linear-gradient(135deg, #008000, #ffd700); color: #1a1a2e; }
        .msg.bot { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,215,0,0.3); color: #f1f5f9; }
        .msg-actions { margin-top: 6px; }
        .listen-btn { background: rgba(255,215,0,0.2); border: none; padding: 3px 10px; border-radius: 16px; color: #ffd700; font-size: 10px; cursor: pointer; }
        .chat-input-area { display: flex; gap: 8px; margin-top: 8px; }
        .chat-input-area input { flex: 1; padding: 12px 16px; border-radius: 40px; background: rgba(30,41,59,0.9); color: white; border: 1px solid rgba(255,215,0,0.3); outline: none; font-size: 14px; }
        .chat-input-area input::placeholder { color: #666; }
        .chat-input-area button { padding: 12px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 13px; transition: all 0.1s ease; }
        .btn-send { background: #008000; color: white; }
        .btn-send:hover { background: #00a000; }
        .btn-mic { background: #ef4444; color: white; }
        .btn-mic:hover { background: #ff5555; }
        .btn-mic.recording { background: #10b981; animation: pulse 1s infinite; }
        .btn-mic.mic-error { background: #ff4444; opacity: 0.6; }
        .btn-mic.idle { background: #ef4444; }
        .btn-mic.listening { background: #10b981; animation: pulse 1s infinite; }
        .btn-mic.processing { background: #f59e0b; animation: pulse 0.5s infinite; }
        .btn-mic.speaking { background: #3b82f6; animation: pulse 0.8s infinite; }
        .btn-stop { background: #0f172a; color: white; border: 1px solid rgba(255,215,0,0.3); }
        .btn-stop:hover { background: #1a2a4a; }
        .status { font-size: 10px; color: #ffd700; padding: 8px 0; text-align: center; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .menu-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .menu-bar button { background: rgba(0,128,0,0.3); border: 1px solid rgba(255,215,0,0.5); padding: 6px 12px; border-radius: 40px; color: #ffd700; cursor: pointer; font-size: 11px; }
        .menu-bar button:hover { background: rgba(0,128,0,0.5); }
        .lesson-card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,215,0,0.2); }
        .lesson-card h3 { color: white; font-size: 16px; margin-bottom: 6px; }
        .lesson-card .content { color: #cbd5e1; font-size: 12px; line-height: 1.5; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .audio-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .audio-bar button { background: #008000; color: white; padding: 5px 14px; border-radius: 40px; border: none; cursor: pointer; font-size: 11px; }
        .audio-bar button:hover { background: #00a000; }
        .audio-bar button.secondary { background: rgba(255, 0, 0, 0.5); }
        .audio-bar button.secondary:hover { background: rgba(255, 0, 0, 0.7); }
        .pron-card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,215,0,0.2); }
        .pron-card .phrase { font-size: 16px; font-weight: 700; color: #ffd700; margin: 6px 0; }
        .pron-card .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .pron-card .actions button { padding: 6px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; }
        .btn-listen { background: #0f172a; color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .btn-listen:hover { background: #1a2a4a; }
        .btn-record { background: #ef4444; color: white; }
        .btn-record:hover { background: #ff5555; }
        .pron-feedback { margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #ffd700; font-size: 11px; color: #cbd5e1; }
        .section-title { color: #ffd700; font-size: 18px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 30px; color: #ffd700; font-size: 13px; }
        .voice-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .voice-indicator.idle { background: #666; }
        .voice-indicator.listening { background: #10b981; animation: pulse 1s infinite; }
        .voice-indicator.processing { background: #f59e0b; animation: pulse 0.5s infinite; }
        .voice-indicator.speaking { background: #3b82f6; animation: pulse 0.8s infinite; }
        .voice-indicator.error { background: #ef4444; }
        @media (max-width: 480px) { .main { padding: 12px; } .msg { max-width: 90%; } .chat-input-area button { padding: 12px 12px; } }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-logo">
            <img src="/static/images/logo.jpg" alt="Logo" onerror="this.src='https://placehold.co/44x44/008000/white?text=W'">
        </div>
        <div class="header-text">
            <h1>WEC-BEC English AI</h1>
            <p>{{ user }} · Level {{ level }}</p>
        </div>
        <div class="streak-badge"><i class="fas fa-crown"></i> Born to lead</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
    </div>

    <div class="nav">
        <button class="active" data-section="chat"><i class="fas fa-comment-dots"></i> Chat</button>
        <button data-section="lessons"><i class="fas fa-book-open"></i> Lessons</button>
        <button data-section="pronunciation"><i class="fas fa-microphone-alt"></i> Pronunciation</button>
    </div>

    <div class="main">
        <div id="section-chat" class="section active">
            <div class="menu-bar">
                <button onclick="showMenu()"><i class="fas fa-chart-line"></i> Menu</button>
                <button onclick="getHint()"><i class="fas fa-lightbulb"></i> Hint</button>
                <button onclick="resetChat()"><i class="fas fa-redo"></i> Reset</button>
            </div>
            <div id="chat-box"></div>
            <div class="status" id="status">
                <span class="voice-indicator idle" id="voiceIndicator"></span>
                Click 🎤 to start voice mode
            </div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type your message..." autocomplete="off" enterkeyhint="send">
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                <button class="btn-mic idle" id="micBtn" onclick="toggleVoiceRecognition()"><i class="fas fa-microphone"></i></button>
                <button class="btn-stop" onclick="stopAllAudio()"><i class="fas fa-stop"></i></button>
            </div>
        </div>

        <div id="section-lessons" class="section">
            <h2 class="section-title">📖 Audio Lessons</h2>
            <div id="lessons-container"><div class="loading">Loading...</div></div>
        </div>

        <div id="section-pronunciation" class="section">
            <h2 class="section-title">🎯 Pronunciation - Self Introduction</h2>
            <div id="pron-container"><div class="loading">Loading...</div></div>
        </div>
    </div>
</div>

<script>
// ============================================================
// 🧠 STATE MACHINE - VOICE MODE
// ============================================================
const VoiceState = {
    IDLE: 'idle',
    LISTENING: 'listening',
    PROCESSING: 'processing',
    SPEAKING: 'speaking',
    ERROR: 'error'
};

// ============================================================
// 📦 VARIABLES GLOBALES
// ============================================================
let voiceMode = false;
let currentRecognition = null;
let isSpeaking = false;
let isListening = false;
let currentUtterance = null;
let coursesData = [];
let micPermissionGranted = false;

// 🔒 VERROUX
let isProcessing = false;
let currentState = VoiceState.IDLE;
let silenceTimer = null;

// 🚫 FILTRE ANTI-ECHO
let lastSentMessage = '';
let lastAIMessage = '';

// 📨 SOURCE DES MESSAGES
const MessageSource = {
    USER: 'user',
    VOICE: 'voice',
    AI: 'ai'
};

const statusEl = document.getElementById('status');
const micBtn = document.getElementById('micBtn');
const msgInput = document.getElementById('msg');
const chatBox = document.getElementById('chat-box');
const voiceIndicator = document.getElementById('voiceIndicator');

// ============================================================
// 🎯 UTILITIES
// ============================================================
function cleanText(text) {
    if (!text) return '';
    return text
        .trim()
        .replace(/\s+/g, ' ')
        .replace(/^\W+|\W+$/g, '');
}

// ✅ 3. FILTRE CRITIQUE (anti-IA echo réel)
function isAIReplay(text) {
    const cleaned = cleanText(text).toLowerCase();
    if (!cleaned) return true;

    // ❌ Si texte est exactement la dernière réponse IA
    if (cleaned === lastAIMessage.toLowerCase()) {
        console.log('🚫 ÉCHO IA DÉTECTÉ (réponse exacte):', cleaned);
        return true;
    }

    return false;
}

// 🚫 FILTRE ANTI-ECHO
function isEcho(text) {
    const cleaned = cleanText(text).toLowerCase();
    if (!cleaned) return true;

    // Ignorer si c'est exactement le dernier message envoyé
    if (cleaned === lastSentMessage.toLowerCase()) {
        console.log('🚫 ÉCHO DÉTECTÉ (dernier message):', cleaned);
        return true;
    }

    return false;
}

// ============================================================
// 🎨 UI STATE MANAGEMENT
// ============================================================
function setVoiceState(state, message) {
    currentState = state;

    if (voiceIndicator) {
        voiceIndicator.className = `voice-indicator ${state}`;
    }

    if (micBtn) {
        micBtn.className = `btn-mic ${state}`;
    }

    const stateMessages = {
        [VoiceState.IDLE]: 'Ready',
        [VoiceState.LISTENING]: '🎤 Listening... Speak now',
        [VoiceState.PROCESSING]: '⏳ Processing...',
        [VoiceState.SPEAKING]: '🔊 Speaking...',
        [VoiceState.ERROR]: '❌ Error'
    };

    const statusText = message || stateMessages[state] || state;
    if (statusEl) {
        statusEl.innerHTML = statusText;
    }
}

function setStatus(message, isError = false) {
    const state = isError ? VoiceState.ERROR : currentState;
    setVoiceState(state, message);
}

// ============================================================
// 🔇 SPEECH SYNTHESIS
// ============================================================
function stopSpeaking() {
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
    }
    isSpeaking = false;
    currentUtterance = null;
    if (!isListening && !isProcessing) {
        setVoiceState(VoiceState.IDLE);
    }
}

function speak(text) {
    return new Promise((resolve, reject) => {
        if (!window.speechSynthesis) {
            reject('Speech synthesis not supported');
            return;
        }

        if (isProcessing) {
            reject('Already processing');
            return;
        }

        // Stocker la réponse IA pour le filtre anti-echo
        lastAIMessage = cleanText(text);

        if (text.length > 500) {
            text = text.substring(0, 500) + '...';
        }

        // ✅ 5. BLOQUE LE MICRO PENDANT QUE L'IA PARLE
        isSpeaking = true;
        const wasListening = isListening;
        if (wasListening) {
            stopListening();
        }
        setVoiceState(VoiceState.SPEAKING);

        let cleanTextMsg = cleanText(text);
        if (!cleanTextMsg) {
            isSpeaking = false;
            reject('No text to speak');
            return;
        }

        currentUtterance = new SpeechSynthesisUtterance(cleanTextMsg);
        currentUtterance.lang = 'en-US';
        currentUtterance.rate = 0.85;
        currentUtterance.pitch = 1.0;
        currentUtterance.volume = 1.0;

        if (speechSynthesis.getVoices().length === 0) {
            speechSynthesis.addEventListener('voiceschanged', () => {
                const voice = getBestVoice();
                if (voice) currentUtterance.voice = voice;
                startSpeaking();
            }, { once: true });
        } else {
            const voice = getBestVoice();
            if (voice) currentUtterance.voice = voice;
            startSpeaking();
        }

        function startSpeaking() {
            currentUtterance.onstart = () => {
                isSpeaking = true;
            };

            currentUtterance.onend = () => {
                isSpeaking = false;
                currentUtterance = null;
                setVoiceState(VoiceState.IDLE);
                resolve();

                // Réactiver le micro après avoir parlé
                if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                    setTimeout(() => {
                        if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                            startListening();
                        }
                    }, 800);
                }
            };

            currentUtterance.onerror = (event) => {
                console.error('Speech error:', event);
                isSpeaking = false;
                currentUtterance = null;
                setVoiceState(VoiceState.ERROR, 'Speech error');
                reject(event);
            };

            window.speechSynthesis.speak(currentUtterance);
        }
    });
}

function getBestVoice() {
    const voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.name.includes('Samantha'));
    if (!voice) voice = voices.find(v => v.name.includes('Google UK English Female'));
    if (!voice) voice = voices.find(v => v.name.includes('Microsoft Jenny'));
    if (!voice) voice = voices.find(v => v.lang === 'en-US');
    if (!voice) voice = voices.find(v => v.lang.startsWith('en'));
    return voice;
}

// ============================================================
// 🎤 MICROPHONE PERMISSION
// ============================================================
async function checkMicrophonePermission() {
    try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            console.log('MediaDevices API not supported');
            return false;
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());
        micPermissionGranted = true;
        return true;
    } catch (error) {
        console.error('Microphone permission error:', error);
        micPermissionGranted = false;

        let msg = 'Microphone error';
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
            msg = '❌ Microphone permission denied. Please allow access.';
        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
            msg = '❌ No microphone found. Connect a microphone.';
        } else {
            msg = '❌ Microphone error. Please try again.';
        }

        setVoiceState(VoiceState.ERROR, msg);
        if (micBtn) {
            micBtn.classList.add('mic-error');
        }
        return false;
    }
}

// ============================================================
// 👂 SPEECH RECOGNITION
// ============================================================
function startListening() {
    if (isListening) return;
    if (isProcessing) {
        setVoiceState(VoiceState.PROCESSING);
        return;
    }
    if (isSpeaking) {
        setVoiceState(VoiceState.SPEAKING);
        return;
    }

    if (!micPermissionGranted) {
        checkMicrophonePermission().then(granted => {
            if (granted) startListening();
        });
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        setVoiceState(VoiceState.ERROR, 'Speech recognition not supported');
        if (micBtn) micBtn.style.opacity = '0.5';
        return;
    }

    if (currentRecognition) {
        try { currentRecognition.stop(); } catch(e) {}
        currentRecognition = null;
    }

    currentRecognition = new SpeechRecognition();
    currentRecognition.lang = 'en-US';
    currentRecognition.continuous = true;
    currentRecognition.interimResults = true;
    currentRecognition.maxAlternatives = 1;

    let accumulatedText = '';
    let isPaused = false;

    currentRecognition.onstart = () => {
        isListening = true;
        isPaused = false;
        accumulatedText = '';
        setVoiceState(VoiceState.LISTENING);
        if (micBtn) {
            micBtn.classList.add('recording');
            micBtn.classList.remove('mic-error');
        }
    };

    currentRecognition.onresult = (event) => {
        let finalText = '';
        let interimText = '';

        for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalText += transcript;
            } else {
                interimText += transcript;
            }
        }

        const cleanedFinal = cleanText(finalText);
        const cleanedInterim = cleanText(interimText);

        if (cleanedFinal) {
            accumulatedText = cleanedFinal;
        }

        const displayText = cleanedFinal || cleanedInterim || '';
        if (msgInput) {
            msgInput.value = displayText;
            msgInput.scrollLeft = msgInput.scrollWidth;
        }

        // ✅ 4. FILTRE CRITIQUE dans SpeechRecognition
        if (cleanedFinal &&
            !isEcho(cleanedFinal) &&
            !isAIReplay(cleanedFinal) &&
            !isProcessing &&
            !isPaused &&
            voiceMode) {

            if (silenceTimer) {
                clearTimeout(silenceTimer);
                silenceTimer = null;
            }

            isPaused = true;
            const message = cleanedFinal;
            accumulatedText = '';
            if (msgInput) msgInput.value = message;

            sendVoiceMessage(message).finally(() => {
                isPaused = false;
                if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                    setTimeout(() => startListening(), 300);
                }
            });
        } else if (cleanedFinal && (isEcho(cleanedFinal) || isAIReplay(cleanedFinal))) {
            // 🚫 ÉCHO OU IA REJOUÉ - On l'ignore
            console.log('🔇 IGNORÉ (écho/IA):', cleanedFinal);
            if (msgInput) msgInput.value = '';
        } else if (cleanedInterim && !isPaused && voiceMode) {
            if (silenceTimer) {
                clearTimeout(silenceTimer);
                silenceTimer = null;
            }

            silenceTimer = setTimeout(() => {
                if (cleanedInterim && !isProcessing && !isPaused && voiceMode) {
                    const message = cleanText(cleanedInterim);
                    if (message && !isEcho(message) && !isAIReplay(message)) {
                        isPaused = true;
                        if (msgInput) msgInput.value = message;
                        sendVoiceMessage(message).finally(() => {
                            isPaused = false;
                            if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                                setTimeout(() => startListening(), 300);
                            }
                        });
                    }
                }
                silenceTimer = null;
            }, 1200);
        }
    };

    currentRecognition.onerror = (event) => {
        console.error('Recognition error:', event.error);
        let msg = 'Microphone error';

        if (event.error === 'no-speech') {
            msg = 'No speech detected - speak louder';
        } else if (event.error === 'audio-capture') {
            msg = 'No microphone found';
        } else if (event.error === 'not-allowed') {
            msg = 'Microphone permission denied';
            micPermissionGranted = false;
        } else if (event.error === 'network') {
            msg = 'Network error - check connection';
        }

        setVoiceState(VoiceState.ERROR, msg);
        isListening = false;
        if (micBtn) micBtn.classList.remove('recording');

        if (voiceMode && !isSpeaking && !isProcessing) {
            setTimeout(() => {
                if (voiceMode && !isListening) {
                    checkMicrophonePermission().then(granted => {
                        if (granted) startListening();
                    });
                }
            }, 3000);
        }
    };

    currentRecognition.onend = () => {
        isListening = false;
        if (micBtn) micBtn.classList.remove('recording');

        if (silenceTimer) {
            clearTimeout(silenceTimer);
            silenceTimer = null;
        }

        if (voiceMode && !isSpeaking && !isProcessing) {
            setTimeout(() => {
                if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                    startListening();
                }
            }, 300);
        }
        if (!isSpeaking && !isProcessing) {
            setVoiceState(VoiceState.IDLE);
        }
    };

    currentRecognition.start();
}

function stopListening() {
    if (currentRecognition) {
        try { currentRecognition.stop(); } catch(e) {}
        currentRecognition = null;
    }
    isListening = false;
    if (micBtn) micBtn.classList.remove('recording');

    if (silenceTimer) {
        clearTimeout(silenceTimer);
        silenceTimer = null;
    }

    if (!isSpeaking && !isProcessing) {
        setVoiceState(VoiceState.IDLE);
    }
}

// ============================================================
// ✅ 2. sendVoiceMessage MODIFIÉ
// ============================================================
async function sendVoiceMessage(text) {
    // 🔒 Bloquer les doubles envois
    if (isProcessing) {
        console.log('⛔ Already processing, skipping:', text);
        return;
    }

    const cleaned = cleanText(text);
    if (!cleaned) {
        console.log('⛔ Empty message, skipping');
        return;
    }

    // 🚫 BLOQUE SI C'EST UNE RÉPÉTITION IMMEDIATE
    if (cleaned === lastSentMessage) {
        console.log('🚫 RÉPÉTITION IMMÉDIATE BLOQUÉE:', cleaned);
        return;
    }

    // 🚫 FILTRE ANTI-ECHO
    if (isEcho(cleaned) || isAIReplay(cleaned)) {
        console.log('🚫 ÉCHO/IA BLOQUÉ - message ignoré:', cleaned);
        if (msgInput) msgInput.value = '';
        return;
    }

    lastSentMessage = cleaned;

    // 🔒 Verrouiller le traitement
    isProcessing = true;
    setVoiceState(VoiceState.PROCESSING);

    // Désactiver l'écoute pendant le traitement
    const wasListening = isListening;
    if (wasListening) {
        stopListening();
    }

    try {
        // Ajouter le message utilisateur dans le chat
        addMessage(cleaned, true, false);

        // Vider l'input
        if (msgInput) msgInput.value = '';

        // ✅ Envoyer avec source VOICE
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: cleaned,
                source: MessageSource.VOICE
            })
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.reply) {
            // Stocker la réponse IA
            lastAIMessage = cleanText(data.reply);
            addMessage(data.reply, false, true);
        } else {
            addMessage('Sorry, I could not process your request.', false, true);
            setVoiceState(VoiceState.ERROR, 'No reply from AI');
        }
    } catch (error) {
        console.error('Chat error:', error);
        addMessage('Connection error. Please try again.', false, true);
        setVoiceState(VoiceState.ERROR, 'Connection error');
    } finally {
        // 🔓 Déverrouiller
        isProcessing = false;

        // Réactiver l'écoute si nécessaire
        if (voiceMode && wasListening && !isSpeaking) {
            setTimeout(() => {
                if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                    startListening();
                }
            }, 500);
        }

        if (!isListening && !isSpeaking) {
            setVoiceState(VoiceState.IDLE);
        }
    }
}

// ============================================================
// 🔄 TOGGLE VOICE MODE
// ============================================================
async function toggleVoiceRecognition() {
    voiceMode = !voiceMode;

    if (voiceMode) {
        const granted = await checkMicrophonePermission();
        if (!granted) {
            voiceMode = false;
            setVoiceState(VoiceState.ERROR, '❌ Cannot start voice mode. Please allow microphone access.');
            if (micBtn) {
                micBtn.classList.remove('recording');
                micBtn.classList.add('mic-error');
            }
            return;
        }

        // Réinitialiser les filtres anti-echo
        lastSentMessage = '';
        lastAIMessage = '';

        setVoiceState(VoiceState.IDLE, '🎤 Voice mode ON - Start speaking...');
        if (micBtn) {
            micBtn.classList.remove('mic-error');
        }
        startListening();
    } else {
        stopListening();
        setVoiceState(VoiceState.IDLE, '🎧 Voice mode OFF (type only)');
        if (micBtn) {
            micBtn.classList.remove('recording');
            micBtn.classList.remove('mic-error');
        }
        isProcessing = false;
    }
}

// ============================================================
// ⏹️ STOP ALL
// ============================================================
function stopAllAudio() {
    window.speechSynthesis.cancel();
    if (currentRecognition && isListening) {
        currentRecognition.stop();
    }
    if (voiceMode) {
        voiceMode = false;
        stopListening();
    }
    isProcessing = false;
    isSpeaking = false;
    if (silenceTimer) {
        clearTimeout(silenceTimer);
        silenceTimer = null;
    }
    setVoiceState(VoiceState.IDLE, '⏹ Stopped');
    if (micBtn) {
        micBtn.classList.remove('recording');
        micBtn.classList.remove('mic-error');
    }
}

// ============================================================
// 💬 CHAT FUNCTIONS
// ============================================================
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function addMessage(text, isUser = false, autoSpeak = true) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    const safeText = escapeHtml(text);

    div.innerHTML = `
        ${isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>'}
        <span>${safeText}</span>
        ${!isUser ? `<div class="msg-actions"><button class="listen-btn" onclick="speak('${safeText.replace(/'/g, "\\'")}')">🔊 Listen</button></div>` : ''}
    `;

    chatBox.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });

    if (!isUser && autoSpeak) {
        speak(text);
    }
}

async function sendMessage(voiceText = null) {
    const message = voiceText !== null ? voiceText : msgInput.value.trim();
    if (!message) return;

    const cleaned = cleanText(message);
    if (!cleaned) return;

    // 🚫 FILTRE ANTI-ECHO pour le texte tapé aussi
    if (isEcho(cleaned) || isAIReplay(cleaned)) {
        console.log('🚫 ÉCHO BLOQUÉ (texte):', cleaned);
        if (msgInput) msgInput.value = '';
        return;
    }

    const wasListening = isListening;
    if (wasListening) {
        stopListening();
    }

    lastSentMessage = cleaned;

    addMessage(cleaned, true, false);

    if (voiceText === null) {
        msgInput.value = '';
    }

    setVoiceState(VoiceState.PROCESSING);

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: cleaned,
                source: MessageSource.USER
            })
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.reply) {
            lastAIMessage = cleanText(data.reply);
            addMessage(data.reply, false, true);
        } else {
            addMessage('Sorry, I could not process your request.', false, true);
            setVoiceState(VoiceState.ERROR, 'No reply');
        }
    } catch (error) {
        console.error('Chat error:', error);
        addMessage('Connection error. Please try again.', false, true);
        setVoiceState(VoiceState.ERROR, 'Connection error');
    }

    if (voiceMode && wasListening && !isSpeaking && !isProcessing) {
        setTimeout(() => startListening(), 500);
    }

    if (!isListening && !isSpeaking) {
        setVoiceState(VoiceState.IDLE);
    }
}

// ============================================================
// 📚 LESSONS & PRONUNCIATION (INCHANGÉ - COMME AVANT)
// ============================================================
async function loadCourses() {
    try {
        const res = await fetch('/courses');
        const data = await res.json();
        coursesData = data.conversations || [];
        renderLessons();
        renderPronunciation();
    } catch (err) {
        console.error(err);
        const container = document.getElementById('lessons-container');
        if (container) container.innerHTML = '<div class="lesson-card">Error loading lessons</div>';
    }
}

function renderLessons() {
    const container = document.getElementById('lessons-container');
    if (!container) return;
    container.innerHTML = '';
    if (!coursesData.length) {
        container.innerHTML = '<div class="lesson-card">No lessons available</div>';
        return;
    }

    coursesData.forEach((lesson, idx) => {
        const card = document.createElement('div');
        card.className = 'lesson-card';
        const safeTitle = escapeHtml(lesson.title);
        const safeContent = escapeHtml(lesson.content || 'No content available').replace(/\n/g, '<br>');
        card.innerHTML = `
            <h3>${safeTitle}</h3>
            <div class="content">${safeContent}</div>
            <div class="audio-bar">
                <button onclick="speak('${escapeHtml(lesson.content || '').replace(/'/g, "\\'").replace(/\n/g, ' ')}')">🎧 Listen Full Lesson</button>
                <button class="secondary" onclick="repeatRandomPhrase(${idx})">🔄 Repeat Random Phrase</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function repeatRandomPhrase(idx) {
    const lesson = coursesData[idx];
    if (!lesson || !lesson.content) return;
    const sentences = lesson.content.split(/[.!?]+/).filter(s => s.trim().length > 10);
    if (sentences.length) {
        const randomPhrase = sentences[Math.floor(Math.random() * sentences.length)].trim() + '.';
        speak(randomPhrase);
    } else {
        speak(lesson.content.substring(0, 200));
    }
}

function renderPronunciation() {
    const container = document.getElementById('pron-container');
    if (!container) return;
    container.innerHTML = '';

    const lesson7Phrases = [
        "Hi everybody!", "Let me introduce myself", "My Surname is Mbongo and my Firstname is Tycoon",
        "I live at number 20, Mapémé Street Nkombo quarter, Djiri area", "I study at Marien Ngouabi University",
        "I attend Marien Ngouabi University", "I am in the first level", "I am a fresher", "I am a Christian",
        "I pray at Catholic Church", "We are 7 in our family", "I am 20 years old", "I am Congolese",
        "I was born in 2002 in Oyo", "I learn English at WEC-BEC", "I am one of the students of O.I",
        "I am a newcomer", "I am still a beginner", "I have been learning English for one week",
        "I learn English because it is one of the most spoken languages in the world", "That's all!"
    ];

    lesson7Phrases.forEach((phrase, idx) => {
        const card = document.createElement('div');
        card.className = 'pron-card';

        card.innerHTML = `

                <button class="btn-listen" onclick="speak('${safePhrase.replace(/'/g, "\\'")}')">🎧 Listen</button>
                <button class="btn-record" onclick="recordPhrase('${safePhrase.replace(/'/g, "\\'")}', ${idx})">🎤 Record</button>
            </div>
            <div class="pron-feedback" id="pron-feedback-${idx}">Click record, speak clearly</div>
        `;
        container.appendChild(card);
    });
}

async function recordPhrase(targetPhrase, idx) {
    const SpeechRecog = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecog) {
        alert('Recording not supported in this browser.');
        return;
    }

    const granted = await checkMicrophonePermission();
    if (!granted) {
        const feedback = document.getElementById(`pron-feedback-${idx}`);
        if (feedback) {
            feedback.innerHTML = '❌ Microphone permission denied. Please allow access.';
            feedback.style.color = '#ef4444';
        }
        return;
    }

    const feedback = document.getElementById(`pron-feedback-${idx}`);
    if (!feedback) return;

    feedback.innerHTML = '🎤 Listening... Please speak clearly.';
    feedback.style.color = '#ffd700';

    const rec = new SpeechRecog();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;

    rec.onresult = (e) => {
        const user = e.results[0][0].transcript;
        const target = targetPhrase.toLowerCase().replace(/[^\w\s]/g, '');
        const userClean = user.toLowerCase().replace(/[^\w\s]/g, '');

        let correct = 0;
        const targetWords = target.split(/\s+/);
        const userWords = userClean.split(/\s+/);

        targetWords.forEach((w, i) => {
            if (userWords[i] && userWords[i] === w) correct++;
        });

        let acc = Math.round((correct / targetWords.length) * 100);
        if (isNaN(acc)) acc = 0;

        let stars = acc >= 90 ? '⭐⭐⭐' : (acc >= 70 ? '⭐⭐' : '⭐');
        let comment = acc >= 90 ? 'Excellent!' : (acc >= 70 ? 'Good job!' : 'Try again.');
        let color = acc >= 90 ? '#10b981' : (acc >= 70 ? '#ffd700' : '#ef4444');

        feedback.innerHTML = `📝 You said: "${escapeHtml(user)}"<br>📊 Accuracy: ${stars} (${acc}%)<br>💡 ${comment}<br>🎯 Target: "${escapeHtml(targetPhrase)}"`;
        feedback.style.color = color;
    };

    rec.onerror = (event) => {
        console.error('Record error:', event.error);
        let errorMsg = '❌ Recording error';
        if (event.error === 'no-speech') errorMsg = '❌ No speech detected. Please speak clearly.';
        else if (event.error === 'not-allowed') {
            errorMsg = '❌ Microphone permission denied.';
            micPermissionGranted = false;
        }
        feedback.innerHTML = errorMsg;
        feedback.style.color = '#ef4444';
    };

    rec.onend = () => {
        if (feedback.innerHTML === '🎤 Listening... Please speak clearly.') {
            feedback.innerHTML = '❌ No speech detected. Please try again.';
            feedback.style.color = '#ef4444';
        }
    };

    rec.start();
}
