<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WEC-BEC English AI – Your Personal English Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 30%, #1a1a2e 100%);
            overflow-x: hidden;
        }
        .app {
            width: 100%;
            max-width: 980px;
            height: 96vh;
            margin: 2vh auto;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 42px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }
        .header {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-text { flex: 1; }
        .header-text h1 { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-text p { font-size: 12px; color: #94a3b8; }
        .streak-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 6px 14px; border-radius: 40px; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; color: white; }
        .logout-btn { background: rgba(239, 68, 68, 0.2); color: #fca5a5; text-decoration: none; padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; transition: 0.3s; border: 1px solid rgba(239, 68, 68, 0.3); }
        .logout-btn:hover { background: #ef4444; color: white; }
        .nav { display: flex; background: rgba(15, 23, 42, 0.9); border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding: 0 8px; gap: 4px; }
        .nav button { flex: 1; padding: 14px 12px; border: none; background: transparent; font-weight: 600; font-size: 14px; color: #94a3b8; cursor: pointer; transition: 0.3s; border-radius: 12px 12px 0 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav button.active { color: #3b82f6; background: rgba(59, 130, 246, 0.15); border-bottom: 2px solid #3b82f6; }
        .main { flex: 1; overflow-y: auto; padding: 24px; }
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .main::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .section { display: none; animation: fadeInUp 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #chat-box { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; max-height: 55vh; overflow-y: auto; padding-right: 8px; }
        .msg { padding: 14px 20px; border-radius: 24px; line-height: 1.5; max-width: 85%; font-size: 15px; }
        .msg.user { margin-left: auto; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border-bottom-right-radius: 6px; }
        .msg.bot { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); color: #f1f5f9; border-bottom-left-radius: 6px; }
        .chat-input-area { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
        .chat-input-area input { flex: 1; border: none; outline: none; padding: 14px 20px; border-radius: 60px; background: rgba(30, 41, 59, 0.9); color: white; font-size: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .chat-input-area input:focus { border-color: #3b82f6; }
        .chat-input-area button { border: none; border-radius: 60px; padding: 12px 20px; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-send { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-mic { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-mic.listening { background: linear-gradient(135deg, #10b981, #059669); animation: pulse 1s infinite; }
        .btn-stop { background: #0f172a; color: white; }
        .status { font-size: 12px; color: #94a3b8; padding: 8px 0; display: flex; align-items: center; gap: 8px; }
        .section-title { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #fff, #94a3b8); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .section-subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }
        .lesson-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 20px 24px; margin-bottom: 16px; transition: all 0.3s ease; }
        .lesson-card:hover { transform: translateY(-3px); border-color: rgba(59,130,246,0.3); }
        .lesson-card h3 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
        .lesson-card .meta { font-size: 12px; color: #8b5cf6; margin-bottom: 12px; }
        .lesson-card .content { font-size: 14px; line-height: 1.6; color: #cbd5e1; margin-bottom: 14px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .audio-bar { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0 12px; }
        .audio-bar button { border: none; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .audio-bar button.secondary { background: rgba(100, 116, 139, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        .pron-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 20px 24px; margin-bottom: 16px; }
        .pron-card .phrase { font-size: 20px; font-weight: 600; color: white; margin: 12px 0; font-style: italic; }
        .pron-card .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .pron-card .actions button { border: none; padding: 10px 22px; border-radius: 999px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .pron-card .actions .btn-listen { background: #0f172a; color: white; }
        .pron-card .actions .btn-record { background: #ef4444; color: white; }
        .pron-feedback { margin-top: 14px; padding: 14px 18px; background: rgba(0, 0, 0, 0.3); border-radius: 14px; border-left: 4px solid #3b82f6; font-size: 13px; color: #cbd5e1; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @media (max-width: 768px) { .app { height: 100vh; margin: 0; border-radius: 0; } .main { padding: 16px; } .msg { max-width: 95%; } }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-text">
            <h1>🎓 WEC‑BEC English AI</h1>
            <p><i class="fas fa-circle"></i> Connected as: {{ user }} · Level: {{ student_level }}</p>
        </div>
        <div class="streak-badge"><i class="fas fa-fire"></i> 7 day streak</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit</a>
    </div>
    <div class="nav">
        <button class="active" data-section="chat"><i class="fas fa-comment-dots"></i> Chat</button>
        <button data-section="lessons"><i class="fas fa-book-open"></i> Lessons</button>
        <button data-section="pronunciation"><i class="fas fa-microphone-alt"></i> Pronunciation</button>
    </div>
    <div class="main">
        <div id="section-chat" class="section active">
            <div id="chat-box"></div>
            <div class="status" id="status">Ready 🎤</div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type or speak in English..." autocomplete="off">
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                <button class="btn-mic" id="micBtn" onclick="startVoice()"><i class="fas fa-microphone"></i> Speak</button>
                <button class="btn-stop" onclick="stopVoice()"><i class="fas fa-stop"></i> Stop</button>
            </div>
        </div>
        <div id="section-lessons" class="section">
            <h2 class="section-title"><i class="fas fa-book-reader"></i> Audio Lessons</h2>
            <p class="section-subtitle">All lessons from courses.json. Click listen to hear the full content.</p>
            <div id="lessons-container"></div>
        </div>
        <div id="section-pronunciation" class="section">
            <h2 class="section-title"><i class="fas fa-microphone-alt"></i> Pronunciation Coach</h2>
            <p class="section-subtitle">Practice pronunciation with real phrases from our lessons.</p>
            <div id="pron-container"></div>
        </div>
    </div>
</div>
<script>
// ========== NAVIGATION ==========
document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + this.dataset.section).classList.add('active');
    });
});

// ========== CHAT ==========
let voiceMode = false;
let recognition = null;
let speaking = false;
let isListening = false;
const statusText = document.getElementById('status');
function setStatus(text) { if(statusText) statusText.innerText = text; }

function getHumanVoice() {
    const voices = speechSynthesis.getVoices();
    return voices.find(v => v.name.includes('Samantha')) || voices.find(v => v.name.includes('Google UK English Female')) || voices.find(v => v.name.includes('Microsoft Jenny')) || voices.find(v => v.lang.includes('en'));
}

function speak(text) {
    window.speechSynthesis.cancel();
    speaking = true;
    setStatus('Speaking... 🔊');
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'en-US';
    speech.rate = 0.9;
    speech.pitch = 1.0;
    const selected = getHumanVoice();
    if (selected) speech.voice = selected;
    speech.onend = () => { speaking = false; setStatus('Ready 🎤'); if (voiceMode) setTimeout(() => startListening(), 800); };
    speechSynthesis.speak(speech);
}

async function sendMessage(textFromVoice = null) {
    const input = document.getElementById('msg');
    const message = textFromVoice ?? input.value;
    if (!message.trim()) return;
    const chat = document.getElementById('chat-box');
    chat.innerHTML += `<div class="msg user"><i class="fas fa-user"></i> ${escapeHtml(message)}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    setStatus('Thinking... 🤖');
    try {
        const res = await fetch('/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message }) });
        const data = await res.json();
        chat.innerHTML += `<div class="msg bot"><i class="fas fa-robot"></i> ${escapeHtml(data.reply)}</div>`;
        chat.scrollTop = chat.scrollHeight;
        speak(data.reply);
    } catch (err) { chat.innerHTML += `<div class="msg bot">Error: Server problem.</div>`; setStatus('Connection error ❌'); }
}

function startListening() {
    if (speaking || isListening) return;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition not supported.'); return; }
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onstart = () => { isListening = true; setStatus('Listening... 🎤'); };
    recognition.onresult = async (e) => {
        const text = e.results[0][0].transcript;
        recognition.stop(); isListening = false;
        document.getElementById('msg').value = text;
        await sendMessage(text);
    };
    recognition.onerror = () => { isListening = false; setStatus('Microphone error ❌'); if (voiceMode) setTimeout(() => startListening(), 1500); };
    recognition.onend = () => { isListening = false; if (voiceMode && !speaking) setTimeout(() => startListening(), 1000); };
    recognition.start();
}
function startVoice() { voiceMode = true; setStatus('Voice mode activated 🎤'); startListening(); document.getElementById('micBtn')?.classList.add('listening'); }
function stopVoice() { voiceMode = false; speaking = false; isListening = false; if (recognition) recognition.stop(); speechSynthesis.cancel(); setStatus('Voice stopped ⛔'); document.getElementById('micBtn')?.classList.remove('listening'); }
function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
window.speechSynthesis.onvoiceschanged = () => { getHumanVoice(); };

// ========== LESSONS (chargement depuis courses.json) ==========
let coursesData = [];
async function loadCourses() {
    try {
        const response = await fetch('/courses');
        const data = await response.json();
        coursesData = data.conversations || [];
        renderLessons();
        renderPronunciation();
    } catch (error) {
        console.error('Error loading courses:', error);
        document.getElementById('lessons-container').innerHTML = '<div class="lesson-card"><p>❌ Error loading lessons.</p></div>';
    }
}

function renderLessons() {
    const container = document.getElementById('lessons-container');
    container.innerHTML = '';
    if (coursesData.length === 0) { container.innerHTML = '<div class="lesson-card"><p>📚 No lessons available.</p></div>'; return; }
    coursesData.forEach((lesson, idx) => {
        const card = document.createElement('div');
        card.className = 'lesson-card';
        card.innerHTML = `
            <h3>${escapeHtml(lesson.title)}</h3>
            <div class="meta">Lesson ${idx+1}</div>
            <div class="content">${escapeHtml(lesson.content || 'No content available.')}</div>
            <div class="audio-bar">
                <button onclick="playFullLesson(${idx})"><i class="fas fa-headphones"></i> Listen to Full Lesson</button>
                <button class="secondary" onclick="speak('${escapeHtml((lesson.content || '').substring(0, 500)).replace(/'/g, "\\'")}')"><i class="fas fa-redo-alt"></i> Repeat</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function playFullLesson(idx) {
    const lesson = coursesData[idx];
    if (lesson && lesson.content) speak(lesson.content);
    else speak("No content available for this lesson.");
}

// ========== PRONUNCIATION ==========
function renderPronunciation() {
    const container = document.getElementById('pron-container');
    container.innerHTML = '';
    if (coursesData.length === 0) { container.innerHTML = '<div class="pron-card"><p>🎙️ No lessons loaded yet.</p></div>'; return; }
    coursesData.slice(0, 15).forEach((lesson, idx) => {
        let content = lesson.content || '';
        let sentences = content.split(/[.!?]+/).filter(s => s.trim().length > 15);
        let practicePhrase = sentences.length > 0 ? sentences[0].trim() + '.' : (content.substring(0, 100) || lesson.title);
        const card = document.createElement('div');
        card.className = 'pron-card';
        card.innerHTML = `
            <h3>From: ${escapeHtml(lesson.title)}</h3>
            <div class="phrase">"${escapeHtml(practicePhrase)}"</div>
            <div class="actions">
                <button class="btn-listen" onclick="speak('${escapeHtml(practicePhrase).replace(/'/g, "\\'")}')"><i class="fas fa-play"></i> Listen</button>
                <button class="btn-record" onclick="recordPhrase('${escapeHtml(practicePhrase).replace(/'/g, "\\'")}', ${idx})"><i class="fas fa-microphone"></i> Record</button>
            </div>
            <div class="pron-feedback" id="pron-feedback-${idx}"><i class="fas fa-lightbulb"></i> Click record, speak clearly, get feedback.</div>
        `;
        container.appendChild(card);
    });
}

async function recordPhrase(targetPhrase, idx) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Recording not supported.'); return; }
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    const feedbackDiv = document.getElementById(`pron-feedback-${idx}`);
    feedbackDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Listening...`;
    rec.onresult = (e) => {
        const userText = e.results[0][0].transcript;
        const target = targetPhrase.toLowerCase().replace(/[^\w\s]/g, '');
        const user = userText.toLowerCase().replace(/[^\w\s]/g, '');
        const targetWords = target.split(/\s+/);
        const userWords = user.split(/\s+/);
        let correct = 0;
        targetWords.forEach((w, i) => { if (userWords[i] === w) correct++; });
        let accuracy = Math.round((correct / targetWords.length) * 100);
        let stars = accuracy >= 90 ? '⭐⭐⭐' : accuracy >= 70 ? '⭐⭐' : '⭐';
        let comment = accuracy >= 90 ? 'Excellent!' : accuracy >= 70 ? 'Good job!' : 'Keep practicing!';
        feedbackDiv.innerHTML = `<i class="fas fa-comment-dots"></i> You said: "${escapeHtml(userText)}"<br><i class="fas fa-chart-simple"></i> Accuracy: ${stars} (${accuracy}%)<br><i class="fas fa-smile-wink"></i> ${comment}<br><i class="fas fa-lightbulb"></i> Target: "${escapeHtml(targetPhrase)}"`;
    };
    rec.onerror = () => { feedbackDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Microphone error. Try again.`; };
    rec.start();
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
    loadCourses();
    const chat = document.getElementById('chat-box');
    chat.innerHTML = `<div class="msg bot"><i class="fas fa-robot"></i> Hello! I'm your WEC-BEC AI tutor. Ask me anything or choose a lesson. 🚀</div>`;
});
</script>
</body>
</html>
