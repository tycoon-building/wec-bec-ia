<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WEC-BEC English AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 30%, #1a1a2e 100%);
            overflow: hidden;
            touch-action: pan-x pan-y;
        }
        .app {
            width: 100%;
            max-width: 1000px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 0 1px rgba(255,215,0,0.2);
        }
        @media (min-width: 1000px) { .app { height: 95vh; margin: 2vh auto; border-radius: 42px; } }
        .header {
            background: linear-gradient(135deg, #008000, #ffd700, #ff0000);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header-logo { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid #ffd700; background: white; flex-shrink: 0; }
        .header-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-text { flex: 1; }
        .header-text h1 { font-size: 18px; color: white; }
        .header-text p { font-size: 10px; color: rgba(255,255,255,0.8); }
        .streak-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 4px 12px; border-radius: 40px; font-weight: 700; font-size: 11px; color: white; white-space: nowrap; }
        .logout-btn { background: rgba(0,0,0,0.3); color: white; padding: 6px 14px; border-radius: 40px; text-decoration: none; font-size: 11px; font-weight: 600; }
        .nav { display: flex; background: rgba(0,0,0,0.4); padding: 0 8px; gap: 4px; flex-shrink: 0; }
        .nav button { flex: 1; padding: 10px 8px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 600; font-size: 13px; cursor: pointer; }
        .nav button.active { color: #ffd700; border-bottom: 2px solid #ffd700; }
        .main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .section { display: none; }
        .section.active { display: block; }
        #chat-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; max-height: 60vh; overflow-y: auto; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { margin-left: auto; background: linear-gradient(135deg, #008000, #ffd700); color: #1a1a2e; }
        .msg.bot { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,215,0,0.3); color: #f1f5f9; }
        .msg-actions { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
        .listen-btn, .repeat-btn { background: rgba(255,215,0,0.2); border: none; padding: 3px 10px; border-radius: 16px; color: #ffd700; font-size: 10px; cursor: pointer; }
        .listen-btn:hover, .repeat-btn:hover { background: rgba(255,215,0,0.4); }
        .chat-input-area { display: flex; gap: 8px; margin-top: 8px; }
        .chat-input-area input { flex: 1; padding: 12px 16px; border-radius: 40px; background: rgba(30,41,59,0.9); color: white; border: 1px solid rgba(255,215,0,0.3); outline: none; font-size: 14px; }
        .chat-input-area input::placeholder { color: #666; }
        .chat-input-area button { padding: 12px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 13px; transition: all 0.1s ease; }
        .btn-send { background: #008000; color: white; }
        .btn-send:hover { background: #00a000; }
        .btn-mic { background: #ef4444; color: white; }
        .btn-mic:hover { background: #ff5555; }
        .btn-mic.listening { background: #10b981; animation: pulse 1s infinite; }
        .btn-stop { background: #0f172a; color: white; border: 1px solid rgba(255,215,0,0.3); }
        .btn-stop:hover { background: #1a2a4a; }
        .status { font-size: 10px; color: #ffd700; padding: 8px 0; text-align: center; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .menu-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .menu-bar button { background: rgba(0,128,0,0.3); border: 1px solid rgba(255,215,0,0.5); padding: 6px 12px; border-radius: 40px; color: #ffd700; cursor: pointer; font-size: 11px; }
        .menu-bar button:hover { background: rgba(0,128,0,0.5); }
        .lesson-card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,215,0,0.2); }
        .lesson-card h3 { color: white; font-size: 16px; margin-bottom: 6px; }
        .lesson-card .meta { color: #ffd700; font-size: 11px; margin-bottom: 6px; }
        .lesson-card .content { color: #cbd5e1; font-size: 12px; line-height: 1.5; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .audio-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .audio-bar button { background: #008000; color: white; padding: 5px 14px; border-radius: 40px; border: none; cursor: pointer; font-size: 11px; }
        .audio-bar button:hover { background: #00a000; }
        .audio-bar button.secondary { background: rgba(255, 0, 0, 0.5); }
        .audio-bar button.secondary:hover { background: rgba(255, 0, 0, 0.7); }
        .pron-card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,215,0,0.2); }
        .pron-card h3 { font-size: 13px; color: #ffd700; margin-bottom: 6px; }
        .pron-card .phrase { font-size: 16px; font-weight: 700; color: white; margin: 6px 0; }
        .pron-card .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .pron-card .actions button { padding: 6px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; }
        .btn-listen { background: #0f172a; color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .btn-listen:hover { background: #1a2a4a; }
        .btn-record { background: #ef4444; color: white; }
        .btn-record:hover { background: #ff5555; }
        .pron-feedback { margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #ffd700; font-size: 11px; color: #cbd5e1; line-height: 1.6; }
        .pron-feedback i { margin-right: 4px; }
        .section-title { color: #ffd700; font-size: 18px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 30px; color: #ffd700; font-size: 13px; }
        @media (max-width: 480px) { .main { padding: 12px; } .msg { max-width: 90%; } .chat-input-area button { padding: 12px 12px; } }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-logo">
            <img src="/static/images/logo.jpg" alt="Logo" onerror="this.src='https://placehold.co/44x44/008000/white?text=W'">
        </div>
        <div class="header-text">
            <h1>WEC-BEC English AI</h1>
            <p>{{ user }} · Level {{ level }}</p>
        </div>
        <div class="streak-badge"><i class="fas fa-crown"></i> Born to lead</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
    </div>

    <div class="nav">
        <button class="active" data-section="chat"><i class="fas fa-comment-dots"></i> Chat</button>
        <button data-section="lessons"><i class="fas fa-book-open"></i> Lessons</button>
        <button data-section="pronunciation"><i class="fas fa-microphone-alt"></i> Pronunciation</button>
    </div>

    <div class="main">
        <div id="section-chat" class="section active">
            <div class="menu-bar">
                <button onclick="showMenu()"><i class="fas fa-chart-line"></i> Menu</button>
                <button onclick="getHint()"><i class="fas fa-lightbulb"></i> Hint</button>
                <button onclick="resetChat()"><i class="fas fa-redo"></i> Reset</button>
            </div>
            <div id="chat-box"></div>
            <div class="status" id="status"><i class="fas fa-circle"></i> Ready</div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type your message..." autocomplete="off" enterkeyhint="send">
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                <button class="btn-mic" id="micBtn" onclick="toggleVoiceMode()"><i class="fas fa-microphone"></i></button>
                <button class="btn-stop" onclick="stopAllAudio()"><i class="fas fa-stop"></i></button>
            </div>
        </div>

        <div id="section-lessons" class="section">
            <h2 class="section-title">📖 Audio Lessons</h2>
            <div id="lessons-container"><div class="loading">Loading...</div></div>
        </div>

        <div id="section-pronunciation" class="section">
            <h2 class="section-title">🎯 Pronunciation Practice</h2>
            <div id="pron-container"><div class="loading">Loading...</div></div>
        </div>
    </div>
</div>

<script>
// ========== GLOBAL VARIABLES ==========
let voiceMode = false;
let currentRecognition = null;
let isSpeaking = false;
let isListening = false;
let currentUtterance = null;
let coursesData = [];

const statusEl = document.getElementById('status');
const micBtn = document.getElementById('micBtn');
const msgInput = document.getElementById('msg');
const chatBox = document.getElementById('chat-box');

// ========== SPEECH SYNTHESIS (TEXT TO SPEECH) ==========
function getBestVoice() {
    const voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.name.includes('Samantha'));
    if (!voice) voice = voices.find(v => v.name.includes('Google UK English Female'));
    if (!voice) voice = voices.find(v => v.name.includes('Microsoft Jenny'));
    if (!voice) voice = voices.find(v => v.lang === 'en-US');
    if (!voice) voice = voices.find(v => v.lang.startsWith('en'));
    return voice;
}

function setStatus(message, isError = false) {
    if (statusEl) {
        statusEl.innerHTML = `<i class="fas fa-circle"></i> ${message}`;
    }
}

function stopSpeaking() {
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
    }
    isSpeaking = false;
    currentUtterance = null;
    setStatus('Ready');
}

function speakText(text) {
    return new Promise((resolve, reject) => {
        if (!window.speechSynthesis) {
            reject('Speech synthesis not supported');
            return;
        }

        stopSpeaking();

        // Nettoyer le texte mais garder la prononciation
        let cleanText = text
            .replace(/[^\w\s\.,!?;:()\-'`]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

        if (!cleanText) {
            reject('No text to speak');
            return;
        }

        currentUtterance = new SpeechSynthesisUtterance(cleanText);
        currentUtterance.lang = 'en-US';
        currentUtterance.rate = 0.85;
        currentUtterance.pitch = 1.0;
        currentUtterance.volume = 1.0;

        const voice = getBestVoice();
        if (voice) currentUtterance.voice = voice;

        currentUtterance.onstart = () => {
            isSpeaking = true;
            setStatus('Speaking...');
        };

        currentUtterance.onend = () => {
            isSpeaking = false;
            currentUtterance = null;
            setStatus('Ready');
            resolve();

            // Mode vocal automatique : se remet à écouter après la réponse
            if (voiceMode && !isListening) {
                setTimeout(() => startListening(), 500);
            }
        };

        currentUtterance.onerror = (event) => {
            console.error('Speech error:', event);
            isSpeaking = false;
            currentUtterance = null;
            setStatus('Speech error');
            reject(event);
        };

        window.speechSynthesis.speak(currentUtterance);
    });
}

// ========== SPEECH RECOGNITION (VOICE INPUT) - MODE AUTO ==========
function startListening() {
    if (isSpeaking) {
        setStatus('Waiting for speech to finish...');
        setTimeout(() => startListening(), 1000);
        return;
    }

    if (isListening) {
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        setStatus('Speech recognition not supported');
        alert('Please use Chrome, Edge, or Safari for voice features.');
        return;
    }

    currentRecognition = new SpeechRecognition();
    currentRecognition.lang = 'en-US';
    currentRecognition.continuous = true;
    currentRecognition.interimResults = true;
    currentRecognition.maxAlternatives = 1;

    let finalTranscript = '';

    currentRecognition.onstart = () => {
        isListening = true;
        setStatus('🎤 Listening... Speak now');
        if (micBtn) micBtn.classList.add('listening');
    };

    currentRecognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscript = transcript;
            } else {
                interimTranscript += transcript;
            }
        }

        if (msgInput) {
            if (finalTranscript) {
                msgInput.value = finalTranscript;
                // Envoi automatique après une pause
                if (finalTranscript) {
                    setTimeout(() => {
                        if (msgInput.value === finalTranscript && !isSpeaking) {
                            const message = msgInput.value;
                            msgInput.value = '';
                            sendMessage(message);
                        }
                    }, 1000);
                }
            } else if (interimTranscript) {
                msgInput.value = interimTranscript;
            }
        }
    };

    currentRecognition.onerror = (event) => {
        console.error('Recognition error:', event.error);
        if (voiceMode) {
            setTimeout(() => startListening(), 2000);
        } else {
            stopListening();
        }
    };

    currentRecognition.onend = () => {
        if (voiceMode && !isSpeaking) {
            setTimeout(() => startListening(), 500);
        } else if (!voiceMode) {
            stopListening();
        }
    };

    currentRecognition.start();
}

function stopListening() {
    if (currentRecognition) {
        try {
            currentRecognition.stop();
        } catch(e) {}
        currentRecognition = null;
    }
    isListening = false;
    if (micBtn) micBtn.classList.remove('listening');
    if (!isSpeaking) setStatus('Ready');
}

function stopAllAudio() {
    stopSpeaking();
    stopListening();
    voiceMode = false;
    if (micBtn) micBtn.classList.remove('listening');
    setStatus('Stopped');
}

function toggleVoiceMode() {
    if (isListening || voiceMode) {
        voiceMode = false;
        stopListening();
        setStatus('Voice mode off');
        if (micBtn) micBtn.classList.remove('listening');
    } else {
        voiceMode = true;
        setStatus('Voice mode ON - Auto listening');
        startListening();
    }
}

// ========== CHAT FUNCTIONS ==========
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function addMessage(text, isUser = false, autoSpeak = true) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;

    const icon = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

    div.innerHTML = `
        ${icon} ${escapeHtml(text)}
        ${!isUser ? `
        <div class="msg-actions">
            <button class="listen-btn" onclick="speakText('${escapeHtml(text).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                <i class="fas fa-headphones"></i> Listen
            </button>
            <button class="repeat-btn" onclick="speakText('${escapeHtml(text).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                <i class="fas fa-redo"></i> Repeat
            </button>
        </div>
        ` : ''}
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    if (!isUser && autoSpeak) {
        speakText(text);
    }
    return div;
}

async function sendMessage(voiceText = null) {
    const message = voiceText !== null ? voiceText : msgInput.value.trim();
    if (!message) return;

    addMessage(message, true, false);

    if (voiceText === null) {
        msgInput.value = '';
    }

    setStatus('Thinking...');

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        if (data.reply) {
            addMessage(data.reply, false, true);
        } else {
            addMessage('Sorry, I could not process your request.', false, true);
            setStatus('Error');
        }
    } catch (error) {
        console.error('Chat error:', error);
        addMessage('Connection error. Please try again.', false, true);
        setStatus('Connection error');
    }
}

// ========== LESSONS ==========
async function loadCourses() {
    try {
        const response = await fetch('/courses');
        const data = await response.json();
        coursesData = data.conversations || [];
        renderLessons();
        renderPronunciation();
    } catch (error) {
        console.error('Error loading courses:', error);
        const container = document.getElementById('lessons-container');
        if (container) container.innerHTML = '<div class="lesson-card"><p>❌ Error loading lessons.</p></div>';
        const pronContainer = document.getElementById('pron-container');
        if (pronContainer) pronContainer.innerHTML = '<div class="pron-card"><p>❌ Error loading exercises.</p></div>';
    }
}

function renderLessons() {
    const container = document.getElementById('lessons-container');
    if (!container) return;
    container.innerHTML = '';

    if (!coursesData || coursesData.length === 0) {
        container.innerHTML = '<div class="lesson-card"><p>📚 No lessons available.</p></div>';
        return;
    }

    coursesData.forEach((lesson, idx) => {
        const card = document.createElement('div');
        card.className = 'lesson-card';
        const contentFull = lesson.content || 'No content available.';
        const contentPreview = contentFull.substring(0, 200);
        card.innerHTML = `
            <h3>${escapeHtml(lesson.title)}</h3>
            <div class="meta">Lesson ${idx+1}</div>
            <div class="content">${escapeHtml(contentPreview)}${contentFull.length > 200 ? '...' : ''}</div>
            <div class="audio-bar">
                <button onclick="event.stopPropagation(); speakText('${escapeHtml(contentFull).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                    <i class="fas fa-headphones"></i> Listen to Full Lesson
                </button>
                <button class="secondary" onclick="event.stopPropagation(); speakText('${escapeHtml(contentFull.substring(0, 500)).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                    <i class="fas fa-redo-alt"></i> Repeat (first part)
                </button>
            </div>
        `;
        container.appendChild(card);
    });
}

// ========== PRONUNCIATION ==========
function renderPronunciation() {
    const container = document.getElementById('pron-container');
    if (!container) return;
    container.innerHTML = '';

    if (!coursesData || coursesData.length === 0) {
        container.innerHTML = '<div class="pron-card"><p>🎙️ No lessons loaded yet.</p></div>';
        return;
    }

    const phrasesToPractice = [];

    for (let i = 0; i < coursesData.length && phrasesToPractice.length < 30; i++) {
        const lesson = coursesData[i];
        let content = lesson.content || '';
        let sentences = content.split(/[.!?]+/).filter(s => s.trim().length > 10 && s.trim().length < 100);

        for (let j = 0; j < sentences.length && phrasesToPractice.length < 30; j++) {
            phrasesToPractice.push({
                phrase: sentences[j].trim() + '.',
                title: lesson.title
            });
        }
    }

    if (phrasesToPractice.length === 0 && coursesData.length > 0) {
        phrasesToPractice.push({
            phrase: "Hello, how are you today?",
            title: "Basic Greetings"
        });
    }

    phrasesToPractice.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'pron-card';
        card.innerHTML = `
            <h3>📖 From: ${escapeHtml(item.title)}</h3>
            <div class="phrase">"${escapeHtml(item.phrase)}"</div>
            <div class="actions">
                <button class="btn-listen" onclick="speakText('${escapeHtml(item.phrase).replace(/'/g, "\\'")}')">
                    <i class="fas fa-play"></i> Listen
                </button>
                <button class="btn-record" onclick="recordPhrase('${escapeHtml(item.phrase).replace(/'/g, "\\'")}', ${idx})">
                    <i class="fas fa-microphone"></i> Record
                </button>
            </div>
            <div class="pron-feedback" id="pron-feedback-${idx}">
                <i class="fas fa-lightbulb"></i> Click record, speak clearly, get instant feedback.
            </div>
        `;
        container.appendChild(card);
    });
}

async function recordPhrase(targetPhrase, idx) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert('Recording not supported in this browser.');
        return;
    }

    const feedbackDiv = document.getElementById(`pron-feedback-${idx}`);
    if (!feedbackDiv) return;

    feedbackDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Listening... Please speak clearly.`;

    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;

    rec.onresult = (e) => {
        const userText = e.results[0][0].transcript;

        const target = targetPhrase.toLowerCase().replace(/[^\w\s]/g, '');
        const user = userText.toLowerCase().replace(/[^\w\s]/g, '');
        const targetWords = target.split(/\s+/).filter(w => w.length > 1);
        const userWords = user.split(/\s+/);

        let correct = 0;
        targetWords.forEach((w, i) => {
            if (userWords[i] === w) correct++;
        });

        let accuracy = targetWords.length > 0 ? Math.round((correct / targetWords.length) * 100) : 0;
        let stars = accuracy >= 90 ? '⭐⭐⭐' : (accuracy >= 70 ? '⭐⭐' : '⭐');
        let comment = accuracy >= 90 ? 'Excellent pronunciation!' : (accuracy >= 70 ? 'Good job! Keep practicing.' : 'Try again. Listen to the example.');

        feedbackDiv.innerHTML = `
            <i class="fas fa-comment-dots"></i> <strong>You said:</strong> "${escapeHtml(userText)}"<br>
            <i class="fas fa-chart-simple"></i> <strong>Accuracy:</strong> ${stars} (${accuracy}%)<br>
            <i class="fas fa-smile-wink"></i> ${comment}<br>
            <i class="fas fa-lightbulb"></i> <strong>Target:</strong> "${escapeHtml(targetPhrase)}"
        `;
    };

    rec.onerror = (event) => {
        feedbackDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Microphone error. Please try again.`;
    };

    rec.start();
}

// ========== COMMANDS ==========
async function showMenu() {
    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'menu' })
        });
        const data = await response.json();
        addMessage(data.reply, false, true);
    } catch (err) {
        addMessage('Error loading menu.', false, true);
    }
}

async function getHint() {
    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'hint' })
        });
        const data = await response.json();
        addMessage(data.reply, false, true);
    } catch (err) {
        addMessage('Error getting hint.', false, true);
    }
}

async function resetChat() {
    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'reset' })
        });
        const data = await response.json();
        chatBox.innerHTML = '';
        addMessage(data.reply, false, true);
    } catch (err) {
        console.error(err);
    }
}

// ========== NAVIGATION ==========
document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + this.dataset.section).classList.add('active');
    });
});

// ========== INITIALIZATION ==========
document.addEventListener('DOMContentLoaded', () => {
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
    }

    loadCourses();

    if (chatBox && chatBox.children.length === 0) {
        addMessage('Hello! I\'m your WEC-BEC English teacher. Ask me anything or choose a lesson. 🚀', false, true);
    }

    if (msgInput) {
        msgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    }
});

window.addEventListener('beforeunload', () => {
    stopAllAudio();
});
</script>
