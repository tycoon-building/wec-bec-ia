<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WEC-BEC English AI – Your Personal English Tutor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 30%, #1a1a2e 100%);
            overflow-x: hidden;
        }
        .app {
            width: 100%;
            max-width: 1200px;
            height: 96vh;
            margin: 2vh auto;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 42px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6);
        }
        .header {
            background: linear-gradient(135deg, rgba(0,128,0,0.95) 0%, rgba(255,215,0,0.9) 50%, rgba(255,0,0,0.95) 100%);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border-bottom: 2px solid rgba(255,215,0,0.5);
        }
        .header-logo {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid gold;
        }
        .header-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-text { flex: 1; }
        .header-text h1 { font-size: 24px; font-weight: 800; color: white; }
        .header-text p { font-size: 12px; color: rgba(255,255,255,0.9); }
        .streak-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 8px 16px; border-radius: 40px; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; color: white; }
        .logout-btn { background: rgba(0,0,0,0.3); color: white; text-decoration: none; padding: 8px 18px; border-radius: 40px; font-size: 13px; font-weight: 600; }
        .nav { display: flex; background: rgba(0,0,0,0.5); padding: 0 8px; gap: 4px; }
        .nav button { flex: 1; padding: 14px 12px; border: none; background: transparent; font-weight: 600; font-size: 14px; color: rgba(255,255,255,0.7); cursor: pointer; }
        .nav button.active { color: #ffd700; border-bottom: 3px solid #ffd700; }
        .main { flex: 1; overflow-y: auto; padding: 24px; }
        .section { display: none; }
        .section.active { display: block; }
        #chat-box { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; max-height: 50vh; overflow-y: auto; }
        .msg { padding: 14px 20px; border-radius: 24px; max-width: 85%; font-size: 15px; }
        .msg.user { margin-left: auto; background: linear-gradient(135deg, #008000, #ffd700); color: #1a1a2e; }
        .msg.bot { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,215,0,0.3); color: #f1f5f9; }
        .msg-actions { margin-top: 8px; display: flex; gap: 8px; }
        .listen-btn { background: rgba(255,215,0,0.2); border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; color: #ffd700; font-size: 12px; }
        .chat-input-area { display: flex; gap: 12px; margin-top: 8px; }
        .chat-input-area input { flex: 1; padding: 14px 20px; border-radius: 60px; background: rgba(30,41,59,0.9); color: white; border: 1px solid rgba(255,215,0,0.3); outline: none; }
        .chat-input-area button { border: none; border-radius: 60px; padding: 12px 20px; cursor: pointer; font-weight: 600; }
        .btn-send { background: linear-gradient(135deg, #008000, #00a000); color: white; }
        .btn-mic { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-mic.recording { background: linear-gradient(135deg, #10b981, #059669); animation: pulse 1s infinite; }
        .btn-stop { background: #0f172a; color: white; }
        .status { font-size: 12px; color: #ffd700; padding: 8px 0; }
        .whisper-badge { background: rgba(16,185,129,0.2); border: 1px solid #10b981; border-radius: 20px; padding: 4px 12px; font-size: 10px; color: #10b981; display: inline-flex; align-items: center; gap: 6px; margin-left: 10px; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
        @media (max-width: 768px) { .app { height: 100vh; margin: 0; border-radius: 0; } .msg { max-width: 95%; } }
        .lesson-card { background: rgba(30,41,59,0.8); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,215,0,0.2); }
        .lesson-card h3 { color: white; margin-bottom: 8px; }
        .lesson-card .content { color: #cbd5e1; font-size: 14px; line-height: 1.6; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .audio-bar { display: flex; gap: 12px; margin-top: 16px; }
        .audio-bar button { background: linear-gradient(135deg, #008000, #006400); color: white; padding: 8px 20px; border-radius: 40px; border: none; cursor: pointer; }
        .pron-card { background: rgba(30,41,59,0.8); border-radius: 24px; padding: 20px; margin-bottom: 16px; border: 1px solid rgba(255,215,0,0.2); }
        .pron-card .phrase { font-size: 22px; font-weight: 700; color: #ffd700; margin: 8px 0; }
        .pron-card .actions { display: flex; gap: 12px; }
        .pron-card .actions button { padding: 10px 22px; border-radius: 999px; border: none; cursor: pointer; font-weight: 600; }
        .btn-listen { background: #0f172a; color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .btn-record { background: #ef4444; color: white; }
        .pron-feedback { margin-top: 14px; padding: 14px; background: rgba(0,0,0,0.3); border-radius: 14px; border-left: 4px solid #ffd700; font-size: 13px; color: #cbd5e1; }
        .loading { text-align: center; padding: 40px; color: #ffd700; }
        .menu-bar { display: flex; gap: 12px; margin-bottom: 16px; }
        .menu-bar button { background: rgba(0,128,0,0.3); border: 1px solid rgba(255,215,0,0.5); padding: 8px 16px; border-radius: 40px; color: #ffd700; cursor: pointer; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-logo">
            <img src="/static/images/logo.jpg" alt="Logo" onerror="this.src='https://placehold.co/55x55/008000/white?text=W'">
        </div>
        <div class="header-text">
            <h1>WEC-BEC English AI <span class="whisper-badge"><i class="fas fa-microphone-alt"></i> Whisper AI</span></h1>
            <p>Connected as: {{ user }} · Level: {{ student_level }}</p>
        </div>
        <div class="streak-badge"><i class="fas fa-crown"></i> Born to lead</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit</a>
    </div>

    <div class="nav">
        <button class="active" data-section="chat"><i class="fas fa-comment-dots"></i> Chat</button>
        <button data-section="lessons"><i class="fas fa-book-open"></i> Lessons</button>
        <button data-section="pronunciation"><i class="fas fa-microphone-alt"></i> Pronunciation</button>
    </div>

    <div class="main">
        <div id="section-chat" class="section active">
            <div class="menu-bar">
                <button onclick="showMenu()"><i class="fas fa-chart-line"></i> Menu</button>
                <button onclick="getHint()"><i class="fas fa-lightbulb"></i> Hint</button>
                <button onclick="resetChat()"><i class="fas fa-redo"></i> Reset</button>
            </div>
            <div id="chat-box"></div>
            <div class="status" id="status">Ready</div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type or speak in English..." autocomplete="off">
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                <button class="btn-mic" id="micBtn" onclick="startWhisperRecording()"><i class="fas fa-microphone"></i> Whisper</button>
                <button class="btn-stop" onclick="stopAllAudio()"><i class="fas fa-stop"></i> Stop</button>
            </div>
        </div>

        <div id="section-lessons" class="section">
            <h2 class="section-title">Audio Lessons</h2>
            <div id="lessons-container"><div class="loading">Loading lessons...</div></div>
        </div>

        <div id="section-pronunciation" class="section">
            <h2 class="section-title">Pronunciation Coach</h2>
            <div id="pron-container"><div class="loading">Loading pronunciation exercises...</div></div>
        </div>
    </div>
</div>

<script>
// ========== SOCKET.IO CONNECTION ==========
const socket = io();

// ========== AUDIO RECORDING ==========
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;

socket.on('transcription', function(data) {
    if (data.text) {
        document.getElementById('msg').value = data.text;
        setStatus('Voice recognized! Sending...');
        sendMessage(data.text);
    } else if (data.error) {
        setStatus('Recognition error: ' + data.error);
    }
});

socket.on('audio_processed', function() {
    setStatus('Ready');
});

async function startWhisperRecording() {
    if (isRecording) {
        stopWhisperRecording();
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
            audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64Audio = reader.result.split(',')[1];
                socket.emit('audio_chunk', { audio: base64Audio });
            };
            stream.getTracks().forEach(track => track.stop());
            isRecording = false;
            micBtn.classList.remove('recording');
            setStatus('Processing audio...');
        };

        mediaRecorder.start();
        isRecording = true;
        const micBtn = document.getElementById('micBtn');
        micBtn.classList.add('recording');
        setStatus('Recording... Click again to stop');

        // Auto-stop après 10 secondes maximum
        setTimeout(() => {
            if (isRecording) stopWhisperRecording();
        }, 10000);

    } catch (err) {
        console.error('Microphone error:', err);
        setStatus('Microphone error. Check permissions.');
    }
}

function stopWhisperRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
    }
}

// ========== SPEECH SYNTHESIS ==========
let speaking = false;
let currentUtterance = null;

function getHumanVoice() {
    const voices = speechSynthesis.getVoices();
    return voices.find(v => v.name.includes('Samantha')) ||
           voices.find(v => v.name.includes('Google UK English Female')) ||
           voices.find(v => v.name.includes('Microsoft Jenny')) ||
           voices.find(v => v.lang.includes('en'));
}

function speak(text) {
    if (!text) return;
    window.speechSynthesis.cancel();
    speaking = true;
    setStatus('Speaking...');
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'en-US';
    speech.rate = 0.9;
    speech.pitch = 1.0;
    const selected = getHumanVoice();
    if (selected) speech.voice = selected;
    speech.onend = () => {
        speaking = false;
        setStatus('Ready');
    };
    speech.onerror = () => {
        speaking = false;
        setStatus('Ready');
    };
    window.speechSynthesis.speak(speech);
}

function stopAllAudio() {
    window.speechSynthesis.cancel();
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
    }
    speaking = false;
    setStatus('Stopped');
}

// ========== CHAT FUNCTIONS ==========
let coursesData = [];
const statusText = document.getElementById('status');
const msgInput = document.getElementById('msg');
const chatBox = document.getElementById('chat-box');

function setStatus(text) { if(statusText) statusText.innerText = text; }

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
    });
}

function addMessage(text, isUser = false, autoSpeak = true) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    const icon = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
    div.innerHTML = `
        ${icon} <span>${escapeHtml(text)}</span>
        ${!isUser ? `
        <div class="msg-actions">
            <button class="listen-btn" onclick="speak('${escapeHtml(text).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                <i class="fas fa-headphones"></i> Listen
            </button>
        </div>
        ` : ''}
    `;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    if (!isUser && autoSpeak) speak(text);
}

async function sendMessage(voiceText = null) {
    const message = voiceText ?? msgInput.value.trim();
    if (!message) return;
    addMessage(message, true, false);
    if (voiceText === null) msgInput.value = '';
    setStatus('Thinking...');
    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });
        const data = await res.json();
        if (data.reply) {
            addMessage(data.reply, false, true);
        } else {
            addMessage('Sorry, I could not process your request.', false, true);
        }
    } catch (err) {
        console.error(err);
        addMessage('Connection error. Please try again.', false, true);
    }
}

async function showMenu() {
    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'menu' })
        });
        const data = await res.json();
        if (data.reply) addMessage(data.reply, false, true);
    } catch (err) {
        addMessage('Error loading menu.', false, true);
    }
}

async function getHint() {
    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'hint' })
        });
        const data = await res.json();
        if (data.reply) addMessage(data.reply, false, true);
    } catch (err) {
        addMessage('Error getting hint.', false, true);
    }
}

async function resetChat() {
    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'reset' })
        });
        const data = await res.json();
        chatBox.innerHTML = '';
        if (data.reply) addMessage(data.reply, false, true);
    } catch (err) {
        console.error(err);
    }
}

// ========== LESSONS ==========
async function loadCourses() {
    try {
        const response = await fetch('/courses');
        const data = await response.json();
        coursesData = data.conversations || [];
        renderLessons();
        renderPronunciation();
    } catch (error) {
        console.error('Error loading courses:', error);
    }
}

function renderLessons() {
    const container = document.getElementById('lessons-container');
    if (!container) return;
    container.innerHTML = '';
    if (!coursesData || coursesData.length === 0) {
        container.innerHTML = '<div class="lesson-card"><p>No lessons available.</p></div>';
        return;
    }
    coursesData.forEach((lesson, idx) => {
        const content = lesson.content || 'No content available.';
        const card = document.createElement('div');
        card.className = 'lesson-card';
        card.innerHTML = `
            <h3>${escapeHtml(lesson.title)}</h3>
            <div class="content">${escapeHtml(content).replace(/\n/g, '<br>')}</div>
            <div class="audio-bar">
                <button onclick="speak('${escapeHtml(content).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">Listen to Full Lesson</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function renderPronunciation() {
    const container = document.getElementById('pron-container');
    if (!container) return;
    container.innerHTML = '';

    const phrases = [
        "Hi everybody!",
        "Let me introduce myself",
        "My name is Tycoon",
        "I am 20 years old",
        "I am Congolese",
        "I learn English at WEC-BEC",
        "I am a beginner"
    ];

    phrases.forEach((phrase, idx) => {
        const card = document.createElement('div');
        card.className = 'pron-card';
        card.innerHTML = `
            <div class="phrase">"${escapeHtml(phrase)}"</div>
            <div class="actions">
                <button class="btn-listen" onclick="speak('${escapeHtml(phrase).replace(/'/g, "\\'")}')">Listen</button>
                <button class="btn-record" onclick="recordPhrase('${escapeHtml(phrase).replace(/'/g, "\\'")}', ${idx})">Record & Compare</button>
            </div>
            <div class="pron-feedback" id="pron-feedback-${idx}">Click record, speak clearly, get feedback.</div>
        `;
        container.appendChild(card);
    });
}

async function recordPhrase(targetPhrase, idx) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert('Recording not supported in this browser.');
        return;
    }
    const feedbackDiv = document.getElementById(`pron-feedback-${idx}`);
    feedbackDiv.innerHTML = 'Listening... Please speak clearly.';
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.onresult = (e) => {
        const userText = e.results[0][0].transcript;
        const target = targetPhrase.toLowerCase().replace(/[^\w\s]/g, '');
        const user = userText.toLowerCase().replace(/[^\w\s]/g, '');
        const targetWords = target.split(/\s+/);
        const userWords = user.split(/\s+/);
        let correct = 0;
        targetWords.forEach((w, i) => { if (userWords[i] === w) correct++; });
        let accuracy = targetWords.length > 0 ? Math.round((correct / targetWords.length) * 100) : 0;
        let stars = accuracy >= 90 ? '⭐⭐⭐' : (accuracy >= 70 ? '⭐⭐' : '⭐');
        let comment = accuracy >= 90 ? 'Excellent!' : (accuracy >= 70 ? 'Good job!' : 'Try again.');
        feedbackDiv.innerHTML = `You said: "${escapeHtml(userText)}"<br>Accuracy: ${stars} (${accuracy}%)<br>${comment}`;
    };
    rec.onerror = () => { feedbackDiv.innerHTML = 'Microphone error. Please try again.'; };
    rec.start();
}

// ========== NAVIGATION ==========
document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const section = this.dataset.section;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + section).classList.add('active');
    });
});

// ========== INIT ==========
window.speechSynthesis.onvoiceschanged = () => { getHumanVoice(); };

document.addEventListener('DOMContentLoaded', () => {
    loadCourses();
    chatBox.innerHTML = `<div class="msg bot"><i class="fas fa-robot"></i> Hello! I'm your WEC-BEC English teacher. Say 'hi' to start our conversation!</div>`;
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
});

window.addEventListener('beforeunload', () => {
    if (mediaRecorder && isRecording) mediaRecorder.stop();
    window.speechSynthesis.cancel();
});
</script>
</body>
</html>
