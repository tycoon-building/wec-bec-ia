<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WEC-BEC English AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 30%, #1a1a2e 100%);
            overflow: hidden;
            touch-action: pan-x pan-y;
        }
        .app {
            width: 100%;
            max-width: 1000px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 0 1px rgba(255,215,0,0.2);
        }
        @media (min-width: 1000px) { .app { height: 95vh; margin: 2vh auto; border-radius: 42px; } }
        .header {
            background: linear-gradient(135deg, #008000, #ffd700, #ff0000);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header-logo { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid #ffd700; background: white; flex-shrink: 0; }
        .header-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-text { flex: 1; }
        .header-text h1 { font-size: 18px; color: white; }
        .header-text p { font-size: 10px; color: rgba(255,255,255,0.8); }
        .streak-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 4px 12px; border-radius: 40px; font-weight: 700; font-size: 11px; color: white; white-space: nowrap; }
        .logout-btn { background: rgba(0,0,0,0.3); color: white; padding: 6px 14px; border-radius: 40px; text-decoration: none; font-size: 11px; font-weight: 600; }
        .nav { display: flex; background: rgba(0,0,0,0.4); padding: 0 8px; gap: 4px; flex-shrink: 0; }
        .nav button { flex: 1; padding: 10px 8px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 600; font-size: 13px; cursor: pointer; }
        .nav button.active { color: #ffd700; border-bottom: 2px solid #ffd700; }
        .main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .section { display: none; }
        .section.active { display: block; }

        #chat-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        #chat-box::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }

        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { margin-left: auto; background: linear-gradient(135deg, #008000, #ffd700); color: #1a1a2e; }
        .msg.bot { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,215,0,0.3); color: #f1f5f9; }
        .msg-actions { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
        .listen-btn, .repeat-btn { background: rgba(255,215,0,0.2); border: none; padding: 3px 10px; border-radius: 16px; color: #ffd700; font-size: 10px; cursor: pointer; }

        .chat-input-area {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            background: rgba(30,41,59,0.9);
            color: white;
            border: 1px solid rgba(255,215,0,0.3);
            outline: none;
            font-size: 14px;
            min-width: 100px;
        }
        .chat-input-area input::placeholder { color: #666; }
        .chat-input-area input:focus { border-color: #ffd700; }

        .chat-input-area button {
            padding: 12px 16px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.1s ease;
            flex-shrink: 0;
        }
        .btn-send { background: #008000; color: white; }
        .btn-send:hover { background: #00a000; }
        .btn-mic { background: #ef4444; color: white; }
        .btn-mic:hover { background: #ff5555; }
        .btn-mic.listening { background: #10b981; animation: pulse 1s infinite; }
        .btn-stop { background: #0f172a; color: white; border: 1px solid rgba(255,215,0,0.3); }
        .btn-stop:hover { background: #1a2a4a; }

        .status { font-size: 10px; color: #ffd700; padding: 8px 0; text-align: center; flex-shrink: 0; }

        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

        .menu-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .menu-bar button { background: rgba(0,128,0,0.3); border: 1px solid rgba(255,215,0,0.5); padding: 6px 12px; border-radius: 40px; color: #ffd700; cursor: pointer; font-size: 11px; }

        .lesson-card {
            background: rgba(30,41,59,0.8);
            border-radius: 20px;
            padding: 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .lesson-card h3 { color: white; font-size: 16px; margin-bottom: 6px; }

        .lesson-content-wrapper {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 8px;
        }
        .lesson-content-wrapper::-webkit-scrollbar { width: 4px; }
        .lesson-content-wrapper::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .lesson-content-wrapper::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }

        .lesson-card .content {
            color: #cbd5e1;
            font-size: 12px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .audio-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .audio-bar button { background: #008000; color: white; padding: 5px 14px; border-radius: 40px; border: none; cursor: pointer; font-size: 11px; }
        .audio-bar button.secondary { background: rgba(255, 0, 0, 0.5); }

        .pron-card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,215,0,0.2); }
        .pron-card .phrase { font-size: 16px; font-weight: 700; color: #ffd700; margin: 6px 0; }
        .pron-card .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .pron-card .actions button { padding: 6px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; }
        .btn-listen { background: #0f172a; color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .btn-record { background: #ef4444; color: white; }
        .pron-feedback { margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #ffd700; font-size: 11px; color: #cbd5e1; line-height: 1.6; }

        .section-title { color: #ffd700; font-size: 18px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 30px; color: #ffd700; font-size: 13px; }

        @media (max-width: 480px) {
            .main { padding: 12px; }
            .msg { max-width: 90%; }
            .chat-input-area { gap: 6px; }
            .chat-input-area input { font-size: 13px; padding: 10px 12px; }
            .chat-input-area button { padding: 10px 12px; font-size: 12px; }
            #chat-box { max-height: 50vh; }
            .lesson-content-wrapper { max-height: 180px; }
        }
        @media (max-width: 380px) {
            .chat-input-area button { padding: 8px 8px; font-size: 11px; }
            .chat-input-area input { padding: 8px 10px; font-size: 12px; }
            .lesson-content-wrapper { max-height: 150px; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-logo">
            <img src="/static/images/logo.jpg" alt="Logo" onerror="this.src='https://placehold.co/44x44/008000/white?text=W'">
        </div>
        <div class="header-text">
            <h1>WEC-BEC English AI</h1>
            <p>{{ user }} · Level {{ level }}</p>
        </div>
        <div class="streak-badge"><i class="fas fa-crown"></i> Born to lead</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
    </div>

    <div class="nav">
        <button class="active" data-section="chat"><i class="fas fa-comment-dots"></i> Chat</button>
        <button data-section="lessons"><i class="fas fa-book-open"></i> Lessons</button>
        <button data-section="pronunciation"><i class="fas fa-microphone-alt"></i> Pronunciation</button>
    </div>

    <div class="main">
        <div id="section-chat" class="section active">
            <div class="menu-bar">
                <button onclick="showMenu()"><i class="fas fa-chart-line"></i> Menu</button>
                <button onclick="getHint()"><i class="fas fa-lightbulb"></i> Hint</button>
                <button onclick="resetChat()"><i class="fas fa-redo"></i> Reset</button>
            </div>
            <div id="chat-box"></div>
            <div class="status" id="status"><i class="fas fa-circle"></i> Ready</div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type your message..." autocomplete="off" enterkeyhint="send">
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                <button class="btn-mic" id="micBtn" onclick="toggleVoiceMode()"><i class="fas fa-microphone"></i></button>
                <button class="btn-stop" onclick="stopAllAudio()"><i class="fas fa-stop"></i></button>
            </div>
        </div>

        <div id="section-lessons" class="section">
            <h2 class="section-title">📖 Audio Lessons</h2>
            <div id="lessons-container"><div class="loading">Loading...</div></div>
        </div>

        <div id="section-pronunciation" class="section">
            <h2 class="section-title">🎯 Pronunciation - Self Introduction</h2>
            <div id="pron-container"><div class="loading">Loading...</div></div>
        </div>
    </div>
</div>

<script>
// ========== GLOBAL VARIABLES ==========
let voiceMode = false;
let currentRecognition = null;
let isSpeaking = false;
let isListening = false;
let currentUtterance = null;
let coursesData = [];
let isProcessing = false;
let lastSentMessage = '';
let lastAIMessage = '';
let isMicReady = true;
let restartTimeout = null;

const statusEl = document.getElementById('status');
const micBtn = document.getElementById('micBtn');
const msgInput = document.getElementById('msg');
const chatBox = document.getElementById('chat-box');

function setStatus(message) {
    if (statusEl) {
        statusEl.innerHTML = `<i class="fas fa-circle"></i> ${message}`;
    }
}

function debugLog(message, data = null) {
    const timestamp = new Date().toLocaleTimeString();
    if (data) {
        console.log(`[${timestamp}] ${message}`, data);
    } else {
        console.log(`[${timestamp}] ${message}`);
    }
}

// ========== SPEECH SYNTHESIS ==========
function getBestVoice() {
    const voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.name.includes('Samantha'));
    if (!voice) voice = voices.find(v => v.name.includes('Google UK English Female'));
    if (!voice) voice = voices.find(v => v.name.includes('Microsoft Jenny'));
    if (!voice) voice = voices.find(v => v.lang === 'en-US');
    if (!voice) voice = voices.find(v => v.lang.startsWith('en'));
    return voice;
}

function stopSpeaking() {
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
    }
    isSpeaking = false;
    currentUtterance = null;
    setStatus('Ready');
    debugLog('🔇 SPEAKING STOPPED');
}

function speakText(text) {
    return new Promise((resolve) => {
        if (!window.speechSynthesis) {
            debugLog('⚠️ Speech synthesis not available');
            resolve();
            return;
        }

        debugLog('🔊 AI START SPEAKING');

        if (isListening) {
            debugLog('🎤 STOPPING LISTENING (before speak)');
            stopListening();
        }

        if (restartTimeout) {
            clearTimeout(restartTimeout);
            restartTimeout = null;
        }

        stopSpeaking();

        lastAIMessage = text.trim();

        let cleanText = text
            .replace(/[^\w\s\.,!?;:()\-'`]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

        if (!cleanText) {
            resolve();
            return;
        }

        currentUtterance = new SpeechSynthesisUtterance(cleanText);
        currentUtterance.lang = 'en-US';
        currentUtterance.rate = 0.85;
        currentUtterance.pitch = 1.0;
        currentUtterance.volume = 1.0;

        const voice = getBestVoice();
        if (voice) currentUtterance.voice = voice;

        currentUtterance.onstart = () => {
            isSpeaking = true;
            isMicReady = false;
            setStatus('Speaking...');
            debugLog('🔊 AI SPEAKING STARTED');
        };

        currentUtterance.onend = () => {
            isSpeaking = false;
            isMicReady = true;
            currentUtterance = null;
            setStatus('Ready');
            debugLog('🔇 AI FINISHED SPEAKING');
            resolve();

            if (voiceMode && !isListening && !isProcessing) {
                debugLog('🎤 SCHEDULED RESTART LISTENING (after speak)');
                restartTimeout = setTimeout(() => {
                    if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                        debugLog('🎤 RESTART LISTENING (after speak)');
                        startListening();
                    }
                    restartTimeout = null;
                }, 1500);
            }
        };

        currentUtterance.onerror = (event) => {
            console.error('Speech error:', event);
            isSpeaking = false;
            isMicReady = true;
            currentUtterance = null;
            setStatus('Speech error');
            debugLog('❌ SPEECH ERROR');
            resolve();
        };

        window.speechSynthesis.speak(currentUtterance);
    });
}

// ========== SPEECH RECOGNITION ==========
function startListening() {
    debugLog('🎤 startListening() CALLED');

    if (isSpeaking) {
        debugLog('⛔ SKIP: AI is speaking');
        setStatus('Waiting for AI to finish...');
        return;
    }

    if (isProcessing) {
        debugLog('⛔ SKIP: Processing in progress');
        setStatus('Processing...');
        return;
    }

    if (isListening) {
        debugLog('⛔ SKIP: Already listening');
        return;
    }

    if (!isMicReady) {
        debugLog('⛔ SKIP: Micro not ready');
        return;
    }

    if (restartTimeout) {
        clearTimeout(restartTimeout);
        restartTimeout = null;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        setStatus('Speech recognition not supported');
        return;
    }

    if (currentRecognition) {
        try {
            currentRecognition.stop();
        } catch(e) {}
        currentRecognition = null;
    }

    currentRecognition = new SpeechRecognition();
    currentRecognition.lang = 'en-US';
    currentRecognition.continuous = false;
    currentRecognition.interimResults = true;
    currentRecognition.maxAlternatives = 1;

    let finalTranscript = '';
    let isSending = false;

    currentRecognition.onstart = () => {
        isListening = true;
        isMicReady = true;
        setStatus('🎤 Listening... Speak now');
        if (micBtn) micBtn.classList.add('listening');
        debugLog('🎤 MIC STARTED (listening)');
    };

    currentRecognition.onresult = (event) => {
        if (isSpeaking) {
            debugLog('⛔ IGNORE: AI is speaking');
            return;
        }

        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscript = transcript;
            } else {
                interimTranscript += transcript;
            }
        }

        if (msgInput) {
            if (finalTranscript) {
                msgInput.value = finalTranscript;
                if (finalTranscript && !isSending && !isProcessing && !isSpeaking) {
                    const message = finalTranscript.trim();
                    if (message) {
                        debugLog('📤 VOICE DETECTED (valid):', message);
                        isSending = true;
                        msgInput.value = '';
                        sendMessage(message).finally(() => {
                            isSending = false;
                        });
                    }
                }
            } else if (interimTranscript) {
                msgInput.value = interimTranscript;
            }
        }
    };

    currentRecognition.onerror = (event) => {
        debugLog('❌ RECOGNITION ERROR:', event.error);
        if (event.error === 'not-allowed') {
            setStatus('Microphone access denied');
            voiceMode = false;
            if (micBtn) micBtn.classList.remove('listening');
        } else if (voiceMode && !isSpeaking) {
            debugLog('🔄 Restarting listening after error');
            restartTimeout = setTimeout(() => {
                if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                    startListening();
                }
                restartTimeout = null;
            }, 2000);
        }
    };

    currentRecognition.onend = () => {
        isListening = false;
        if (micBtn) micBtn.classList.remove('listening');
        debugLog('🎤 MIC ENDED');

        if (voiceMode && !isSpeaking && !isProcessing && isMicReady) {
            debugLog('🔄 Auto-restart listening (onend fallback)');
            restartTimeout = setTimeout(() => {
                if (voiceMode && !isListening && !isSpeaking && !isProcessing) {
                    startListening();
                }
                restartTimeout = null;
            }, 500);
        }
    };

    currentRecognition.start();
}

function stopListening() {
    debugLog('🎤 stopListening() CALLED');

    if (restartTimeout) {
        clearTimeout(restartTimeout);
        restartTimeout = null;
    }

    if (currentRecognition) {
        try {
            currentRecognition.stop();
        } catch(e) {}
        currentRecognition = null;
    }
    isListening = false;
    if (micBtn) micBtn.classList.remove('listening');
    if (!isSpeaking) setStatus('Ready');
}

function stopAllAudio() {
    debugLog('⏹ STOP ALL AUDIO');
    stopSpeaking();
    stopListening();
    voiceMode = false;
    isProcessing = false;
    isMicReady = true;
    if (restartTimeout) {
        clearTimeout(restartTimeout);
        restartTimeout = null;
    }
    if (micBtn) micBtn.classList.remove('listening');
    setStatus('Stopped');
}

function toggleVoiceMode() {
    debugLog('🔄 TOGGLE VOICE MODE');
    if (isListening || voiceMode) {
        voiceMode = false;
        stopListening();
        setStatus('Voice mode off');
        if (micBtn) micBtn.classList.remove('listening');
        debugLog('📴 Voice mode OFF');
    } else {
        voiceMode = true;
        isMicReady = true;
        setStatus('Voice mode ON - Auto listening');
        debugLog('📴 Voice mode ON');
        startListening();
    }
}

// ========== CHAT FUNCTIONS ==========
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function addMessage(text, isUser = false, autoSpeak = true) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    const icon = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

    div.innerHTML = `
        ${icon} ${escapeHtml(text)}
        ${!isUser ? `
        <div class="msg-actions">
            <button class="listen-btn" onclick="speakText('${escapeHtml(text).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                <i class="fas fa-headphones"></i> Listen
            </button>
            <button class="repeat-btn" onclick="speakText('${escapeHtml(text).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                <i class="fas fa-redo"></i> Repeat
            </button>
        </div>
        ` : ''}
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    if (!isUser && autoSpeak) {
        speakText(text);
    }
    return div;
}

async function sendMessage(voiceText = null) {
    if (isProcessing) {
        debugLog('⛔ Already processing, skipping');
        return;
    }

    const message = voiceText !== null ? voiceText : msgInput.value.trim();
    if (!message) return;

    lastSentMessage = message;

    addMessage(message, true, false);

    if (voiceText === null) {
        msgInput.value = '';
    }

    isProcessing = true;
    setStatus('Thinking...');
    debugLog('💭 Processing message:', message);

    const wasListening = isListening;
    if (wasListening) {
        debugLog('🎤 STOPPING LISTENING (during processing)');
        stopListening();
    }

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        if (data.reply) {
            debugLog('📥 AI Reply received');
            addMessage(data.reply, false, true);
        } else {
            addMessage('Sorry, I could not process your request.', false, true);
            setStatus('Error');
        }
    } catch (error) {
        console.error('Chat error:', error);
        addMessage('Connection error. Please try again.', false, true);
        setStatus('Connection error');
    } finally {
        isProcessing = false;
        debugLog('✅ Processing finished');
    }
}

// ========== LESSONS ==========
async function loadCourses() {
    try {
        const response = await fetch('/courses');
        const data = await response.json();
        coursesData = data.conversations || [];
        renderLessons();
        renderPronunciation();
    } catch (error) {
        console.error('Error loading courses:', error);
        const container = document.getElementById('lessons-container');
        if (container) container.innerHTML = '<div class="lesson-card"><p>❌ Error loading lessons.</p></div>';
    }
}

function renderLessons() {
    const container = document.getElementById('lessons-container');
    if (!container) return;
    container.innerHTML = '';

    if (!coursesData || coursesData.length === 0) {
        container.innerHTML = '<div class="lesson-card"><p>📚 No lessons available.</p></div>';
        return;
    }

    coursesData.forEach((lesson, idx) => {
        const card = document.createElement('div');
        card.className = 'lesson-card';
        const contentFull = lesson.content || 'No content available.';

        card.innerHTML = `
            <h3>${escapeHtml(lesson.title)}</h3>
            <div class="lesson-content-wrapper">
                <div class="content">${escapeHtml(contentFull).replace(/\n/g, '<br>')}</div>
            </div>
            <div class="audio-bar">
                <button onclick="speakText('${escapeHtml(contentFull).replace(/'/g, "\\'").replace(/\n/g, ' ')}')">
                    <i class="fas fa-headphones"></i> Listen Full Lesson
                </button>
                <button class="secondary" onclick="repeatRandomPhrase(${idx})">
                    <i class="fas fa-redo-alt"></i> Repeat Random Phrase
                </button>
            </div>
        `;
        container.appendChild(card);
    });
}

function repeatRandomPhrase(idx) {
    const lesson = coursesData[idx];
    if (!lesson || !lesson.content) return;
    const sentences = lesson.content.split(/[.!?]+/).filter(s => s.trim().length > 10);
    if (sentences.length) {
        const randomPhrase = sentences[Math.floor(Math.random() * sentences.length)].trim() + '.';
        speakText(randomPhrase);
    } else {
        speakText(lesson.content.substring(0, 200));
    }
}

async function recordPhrase(targetPhrase, idx) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert('Recording not supported in this browser.');
        return;
    }

    const feedbackDiv = document.getElementById(`pron-feedback-${idx}`);
    if (!feedbackDiv) return;

    feedbackDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Listening... Please speak clearly.`;

    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;

    rec.onresult = (e) => {
        const userText = e.results[0][0].transcript;

        const target = targetPhrase.toLowerCase().replace(/[^\w\s]/g, '');
        const user = userText.toLowerCase().replace(/[^\w\s]/g, '');
        const targetWords = target.split(/\s+/).filter(w => w.length > 1);
        const userWords = user.split(/\s+/);

        let correct = 0;
        targetWords.forEach((w, i) => {
            if (userWords[i] === w) correct++;
        });

        let accuracy = targetWords.length > 0 ? Math.round((correct / targetWords.length) * 100) : 0;
        let stars = accuracy >= 90 ? '⭐⭐⭐' : (accuracy >= 70 ? '⭐⭐' : '⭐');
        let comment = accuracy >= 90 ? 'Excellent pronunciation!' : (accuracy >= 70 ? 'Good job! Keep practicing.' : 'Try again. Listen to the example.');

        feedbackDiv.innerHTML = `
            <i class="fas fa-comment-dots"></i> <strong>You said:</strong> "${escapeHtml(userText)}"<br>
            <i class="fas fa-chart-simple"></i> <strong>Accuracy:</strong> ${stars} (${accuracy}%)<br>
            <i class="fas fa-smile-wink"></i> ${comment}<br>
            <i class="fas fa-lightbulb"></i> <strong>Target:</strong> "${escapeHtml(targetPhrase)}"
        `;
    };

    rec.onerror = (event) => {
        feedbackDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Microphone error. Please try again.`;
    };

    rec.start();
}
