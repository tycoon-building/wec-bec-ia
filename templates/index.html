<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>WEC-BEC English AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 30%, #1a1a2e 100%);
            overflow: hidden;
            touch-action: pan-x pan-y;
        }
        .app {
            width: 100%;
            max-width: 1000px;
            height: 100vh;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 0 1px rgba(255,215,0,0.2);
        }
        @media (min-width: 1000px) { .app { height: 95vh; margin: 2vh auto; border-radius: 42px; } }
        .header {
            background: linear-gradient(135deg, #008000, #ffd700, #ff0000);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .header-logo { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid #ffd700; background: white; flex-shrink: 0; }
        .header-logo img { width: 100%; height: 100%; object-fit: cover; }
        .header-text { flex: 1; }
        .header-text h1 { font-size: 18px; color: white; }
        .header-text p { font-size: 10px; color: rgba(255,255,255,0.8); }
        .streak-badge { background: linear-gradient(135deg, #f59e0b, #ef4444); padding: 4px 12px; border-radius: 40px; font-weight: 700; font-size: 11px; color: white; white-space: nowrap; }
        .logout-btn { background: rgba(0,0,0,0.3); color: white; padding: 6px 14px; border-radius: 40px; text-decoration: none; font-size: 11px; font-weight: 600; }
        .nav { display: flex; background: rgba(0,0,0,0.4); padding: 0 8px; gap: 4px; flex-shrink: 0; }
        .nav button { flex: 1; padding: 10px 8px; border: none; background: transparent; color: rgba(255,255,255,0.7); font-weight: 600; font-size: 13px; cursor: pointer; }
        .nav button.active { color: #ffd700; border-bottom: 2px solid #ffd700; }
        .main { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }
        .section { display: none; }
        .section.active { display: block; }
        #chat-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; max-height: 60vh; overflow-y: auto; }
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; font-size: 14px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { margin-left: auto; background: linear-gradient(135deg, #008000, #ffd700); color: #1a1a2e; }
        .msg.bot { background: rgba(30,41,59,0.9); border: 1px solid rgba(255,215,0,0.3); color: #f1f5f9; }
        .msg-actions { margin-top: 6px; }
        .listen-btn { background: rgba(255,215,0,0.2); border: none; padding: 3px 10px; border-radius: 16px; color: #ffd700; font-size: 10px; cursor: pointer; }
        .chat-input-area { display: flex; gap: 8px; margin-top: 8px; }
        .chat-input-area input { flex: 1; padding: 12px 16px; border-radius: 40px; background: rgba(30,41,59,0.9); color: white; border: 1px solid rgba(255,215,0,0.3); outline: none; font-size: 14px; }
        .chat-input-area input::placeholder { color: #666; }
        .chat-input-area button { padding: 12px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 13px; transition: all 0.1s ease; }
        .btn-send { background: #008000; color: white; }
        .btn-send:hover { background: #00a000; }
        .btn-mic { background: #ef4444; color: white; }
        .btn-mic:hover { background: #ff5555; }
        .btn-mic.recording { background: #10b981; animation: pulse 1s infinite; }
        .btn-mic.mic-error { background: #ff4444; opacity: 0.6; }
        .btn-stop { background: #0f172a; color: white; border: 1px solid rgba(255,215,0,0.3); }
        .btn-stop:hover { background: #1a2a4a; }
        .status { font-size: 10px; color: #ffd700; padding: 8px 0; text-align: center; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .menu-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .menu-bar button { background: rgba(0,128,0,0.3); border: 1px solid rgba(255,215,0,0.5); padding: 6px 12px; border-radius: 40px; color: #ffd700; cursor: pointer; font-size: 11px; }
        .menu-bar button:hover { background: rgba(0,128,0,0.5); }
        .lesson-card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,215,0,0.2); }
        .lesson-card h3 { color: white; font-size: 16px; margin-bottom: 6px; }
        .lesson-card .content { color: #cbd5e1; font-size: 12px; line-height: 1.5; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
        .audio-bar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .audio-bar button { background: #008000; color: white; padding: 5px 14px; border-radius: 40px; border: none; cursor: pointer; font-size: 11px; }
        .audio-bar button:hover { background: #00a000; }
        .audio-bar button.secondary { background: rgba(255, 0, 0, 0.5); }
        .audio-bar button.secondary:hover { background: rgba(255, 0, 0, 0.7); }
        .pron-card { background: rgba(30,41,59,0.8); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(255,215,0,0.2); }
        .pron-card .phrase { font-size: 16px; font-weight: 700; color: #ffd700; margin: 6px 0; }
        .pron-card .actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .pron-card .actions button { padding: 6px 16px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 12px; }
        .btn-listen { background: #0f172a; color: #ffd700; border: 1px solid rgba(255,215,0,0.3); }
        .btn-listen:hover { background: #1a2a4a; }
        .btn-record { background: #ef4444; color: white; }
        .btn-record:hover { background: #ff5555; }
        .pron-feedback { margin-top: 10px; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 12px; border-left: 3px solid #ffd700; font-size: 11px; color: #cbd5e1; }
        .section-title { color: #ffd700; font-size: 18px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 30px; color: #ffd700; font-size: 13px; }
        @media (max-width: 480px) { .main { padding: 12px; } .msg { max-width: 90%; } .chat-input-area button { padding: 12px 12px; } }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-logo">
            <img src="/static/images/logo.jpg" alt="Logo" onerror="this.src='https://placehold.co/44x44/008000/white?text=W'">
        </div>
        <div class="header-text">
            <h1>WEC-BEC English AI</h1>
            <p>{{ user }} · Level {{ level }}</p>
        </div>
        <div class="streak-badge"><i class="fas fa-crown"></i> Born to lead</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i></a>
    </div>

    <div class="nav">
        <button class="active" data-section="chat"><i class="fas fa-comment-dots"></i> Chat</button>
        <button data-section="lessons"><i class="fas fa-book-open"></i> Lessons</button>
        <button data-section="pronunciation"><i class="fas fa-microphone-alt"></i> Pronunciation</button>
    </div>

    <div class="main">
        <div id="section-chat" class="section active">
            <div class="menu-bar">
                <button onclick="showMenu()"><i class="fas fa-chart-line"></i> Menu</button>
                <button onclick="getHint()"><i class="fas fa-lightbulb"></i> Hint</button>
                <button onclick="resetChat()"><i class="fas fa-redo"></i> Reset</button>
            </div>
            <div id="chat-box"></div>
            <div class="status" id="status">Click 🎤 to start voice mode</div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type your message..." autocomplete="off" enterkeyhint="send">
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                <button class="btn-mic" id="micBtn" onclick="toggleVoiceRecognition()"><i class="fas fa-microphone"></i></button>
                <button class="btn-stop" onclick="stopAllAudio()"><i class="fas fa-stop"></i></button>
            </div>
        </div>

        <div id="section-lessons" class="section">
            <h2 class="section-title">📖 Audio Lessons</h2>
            <div id="lessons-container"><div class="loading">Loading...</div></div>
        </div>

        <div id="section-pronunciation" class="section">
            <h2 class="section-title">🎯 Pronunciation - Self Introduction</h2>
            <div id="pron-container"><div class="loading">Loading...</div></div>
        </div>
    </div>
</div>

<script>
// ========== VOICE MODE - MICRO EN CONTINU ==========
let voiceMode = false;
let currentRecognition = null;
let isSpeaking = false;
let isListening = false;
let currentUtterance = null;
let coursesData = [];
let micPermissionGranted = false;
let isProcessingVoice = false; // Empêche les doublons de messages vocaux

const statusEl = document.getElementById('status');
const micBtn = document.getElementById('micBtn');
const msgInput = document.getElementById('msg');
const chatBox = document.getElementById('chat-box');

function setStatus(message, isError = false) {
    if (statusEl) {
        const icon = isError ? '❌' : (isSpeaking ? '🔊' : (isListening ? '🎤' : '🎧'));
        statusEl.innerHTML = `${message} ${icon}`;
    }
}

function stopSpeaking() {
    if (window.speechSynthesis) {
        window.speechSynthesis.cancel();
    }
    isSpeaking = false;
    currentUtterance = null;
    if (!isListening) setStatus('Ready');
}

function speak(text) {
    return new Promise((resolve, reject) => {
        if (!window.speechSynthesis) {
            reject('Speech synthesis not supported');
            return;
        }

        if (text.length > 500) {
            text = text.substring(0, 500) + '...';
        }

        stopSpeaking();

        let cleanText = text
            .replace(/[^\w\s\.,!?;:()\-'\u00C0-\u00FF]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();

        if (!cleanText) {
            reject('No text to speak');
            return;
        }

        currentUtterance = new SpeechSynthesisUtterance(cleanText);
        currentUtterance.lang = 'en-US';
        currentUtterance.rate = 0.85;
        currentUtterance.pitch = 1.0;
        currentUtterance.volume = 1.0;

        if (speechSynthesis.getVoices().length === 0) {
            speechSynthesis.addEventListener('voiceschanged', () => {
                const voice = getBestVoice();
                if (voice) currentUtterance.voice = voice;
                startSpeaking();
            });
        } else {
            const voice = getBestVoice();
            if (voice) currentUtterance.voice = voice;
            startSpeaking();
        }

        function startSpeaking() {
            currentUtterance.onstart = () => {
                isSpeaking = true;
                setStatus('Speaking...');
            };

            currentUtterance.onend = () => {
                isSpeaking = false;
                currentUtterance = null;
                setStatus('Ready');
                resolve();

                if (voiceMode && !isListening && !isSpeaking) {
                    setTimeout(() => startListening(), 500);
                }
            };

            currentUtterance.onerror = (event) => {
                console.error('Speech error:', event);
                isSpeaking = false;
                currentUtterance = null;
                setStatus('Speech error', true);
                reject(event);
            };

            window.speechSynthesis.speak(currentUtterance);
        }
    });
}

function getBestVoice() {
    const voices = speechSynthesis.getVoices();
    let voice = voices.find(v => v.name.includes('Samantha'));
    if (!voice) voice = voices.find(v => v.name.includes('Google UK English Female'));
    if (!voice) voice = voices.find(v => v.name.includes('Microsoft Jenny'));
    if (!voice) voice = voices.find(v => v.lang === 'en-US');
    if (!voice) voice = voices.find(v => v.lang.startsWith('en'));
    return voice;
}

// ========== CHECK MIC PERMISSION ==========
async function checkMicrophonePermission() {
    try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            console.log('MediaDevices API not supported');
            return false;
        }

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());
        micPermissionGranted = true;
        return true;
    } catch (error) {
        console.error('Microphone permission error:', error);
        micPermissionGranted = false;

        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
            setStatus('❌ Microphone permission denied. Please allow microphone access.', true);
            if (micBtn) {
                micBtn.classList.add('mic-error');
                micBtn.title = 'Microphone permission denied - Click to request again';
            }
        } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
            setStatus('❌ No microphone found. Please connect a microphone.', true);
        } else {
            setStatus('❌ Microphone error. Please try again.', true);
        }

        return false;
    }
}

// ========== SPEECH RECOGNITION ==========
function startListening() {
    if (isSpeaking) {
        setStatus('Waiting for speech to finish...');
        return;
    }

    if (isListening) {
        return;
    }

    if (!micPermissionGranted) {
        checkMicrophonePermission().then(granted => {
            if (granted) {
                startListening();
            } else {
                setStatus('❌ Cannot start microphone. Permission denied.', true);
                if (micBtn) micBtn.classList.remove('recording');
            }
        });
        return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        setStatus('Speech recognition not supported', true);
        if (micBtn) micBtn.style.opacity = '0.5';
        return;
    }

    if (currentRecognition) {
        try {
            currentRecognition.stop();
        } catch(e) {}
        currentRecognition = null;
    }

    currentRecognition = new SpeechRecognition();
    currentRecognition.lang = 'en-US';
    currentRecognition.continuous = true;
    currentRecognition.interimResults = true;
    currentRecognition.maxAlternatives = 1;

    let finalTranscript = '';

    currentRecognition.onstart = () => {
        isListening = true;
        isProcessingVoice = false;
        setStatus('🎤 Listening... Speak now');
        if (micBtn) {
            micBtn.classList.add('recording');
            micBtn.classList.remove('mic-error');
        }
    };

    currentRecognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
                finalTranscript = transcript;
                if (finalTranscript && finalTranscript.trim() && !isProcessingVoice) {
                    isProcessingVoice = true;
                    const message = finalTranscript.trim();
                    finalTranscript = '';
                    // Afficher dans l'input pour feedback visuel mais pas automatiquement envoyé
                    if (msgInput) {
                        msgInput.value = message;
                    }
                    // Envoyer le message
                    sendMessage(message).finally(() => {
                        isProcessingVoice = false;
                    });
                }
            } else {
                interimTranscript += transcript;
            }
        }

        // Afficher le texte provisoire dans l'input
        if (msgInput && !isProcessingVoice) {
            if (finalTranscript) {
                msgInput.value = finalTranscript;
            } else if (interimTranscript) {
                msgInput.value = interimTranscript + '...';
            }
        }
    };

    currentRecognition.onerror = (event) => {
        console.error('Recognition error:', event.error);
        let errorMsg = 'Microphone error';

        if (event.error === 'no-speech') {
            errorMsg = 'No speech detected - speak louder';
        } else if (event.error === 'audio-capture') {
            errorMsg = 'No microphone found';
        } else if (event.error === 'not-allowed') {
            errorMsg = 'Microphone permission denied';
            micPermissionGranted = false;
        } else if (event.error === 'network') {
            errorMsg = 'Network error - check connection';
        }

        setStatus(errorMsg, true);
        isListening = false;

        if (micBtn) {
            micBtn.classList.remove('recording');
        }

        if (voiceMode && !isSpeaking) {
            setTimeout(() => {
                if (voiceMode && !isListening) {
                    checkMicrophonePermission().then(granted => {
                        if (granted) startListening();
                    });
                }
            }, 3000);
        }
    };

    currentRecognition.onend = () => {
        isListening = false;
        if (micBtn) {
            micBtn.classList.remove('recording');
        }

        if (voiceMode && !isSpeaking && !isListening) {
            setTimeout(() => {
                if (voiceMode && !isSpeaking && !isListening) {
                    startListening();
                }
            }, 500);
        }
        if (!isSpeaking) setStatus('Ready');
    };

    currentRecognition.start();
}

function stopListening() {
    if (currentRecognition) {
        try {
            currentRecognition.stop();
        } catch(e) {}
        currentRecognition = null;
    }
    isListening = false;
    isProcessingVoice = false;
    if (micBtn) {
        micBtn.classList.remove('recording');
    }
    if (!isSpeaking) setStatus('Ready');
}

async function toggleVoiceRecognition() {
    voiceMode = !voiceMode;

    if (voiceMode) {
        const granted = await checkMicrophonePermission();
        if (!granted) {
            voiceMode = false;
            setStatus('❌ Cannot start voice mode. Please allow microphone access.', true);
            if (micBtn) {
                micBtn.classList.remove('recording');
                micBtn.classList.add('mic-error');
            }
            return;
        }

        setStatus('🎤 Voice mode ON - Start speaking...');
        if (micBtn) {
            micBtn.classList.remove('mic-error');
        }
        startListening();
    } else {
        stopListening();
        setStatus('🎧 Voice mode OFF (type only)');
        if (micBtn) {
            micBtn.classList.remove('recording');
            micBtn.classList.remove('mic-error');
        }
    }
}

function stopAllAudio() {
    window.speechSynthesis.cancel();
    if (currentRecognition && isListening) {
        currentRecognition.stop();
    }
    if (voiceMode) {
        voiceMode = false;
        stopListening();
    }
    setStatus('⏹ Stopped');
    if (micBtn) {
        micBtn.classList.remove('recording');
        micBtn.classList.remove('mic-error');
    }
}

// ========== CHAT FUNCTIONS ==========
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function addMessage(text, isUser = false, autoSpeak = true) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    const safeText = escapeHtml(text);

    div.innerHTML = `
        ${isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>'}
        <span>${safeText}</span>
        ${!isUser ? `<div class="msg-actions"><button class="listen-btn" onclick="speak('${safeText.replace(/'/g, "\\'")}')">🔊 Listen</button></div>` : ''}
    `;

    chatBox.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });

    if (!isUser && autoSpeak) {
        speak(text);
    }
}

async function sendMessage(voiceText = null) {
    // Récupérer le message
    let message;
    if (voiceText !== null) {
        message = voiceText;
    } else {
        message = msgInput.value.trim();
    }

    if (!message) return;

    // Désactiver l'écoute pendant l'envoi
    const wasListening = isListening;
    if (wasListening) {
        stopListening();
    }

    // Ajouter le message utilisateur dans le chat
    addMessage(message, true, false);

    // Vider l'input (sauf si c'est une commande vocale, déjà fait)
    if (voiceText === null) {
        msgInput.value = '';
    }

    setStatus('Thinking...');

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();

        if (data.reply) {
            // Ajouter la réponse de l'IA dans le chat (SANS la mettre dans l'input)
            addMessage(data.reply, false, true);
        } else {
            addMessage('Sorry, I could not process your request.', false, true);
            setStatus('Error', true);
        }
    } catch (error) {
        console.error('Chat error:', error);
        addMessage('Connection error. Please try again.', false, true);
        setStatus('Connection error', true);
    }

    // Réactiver l'écoute si nécessaire
    if (voiceMode && wasListening && !isSpeaking) {
        setTimeout(() => startListening(), 500);
    }
}

async function showMenu() {
    const wasListening = isListening;
    if (wasListening) stopListening();

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'menu' })
        });
        const data = await response.json();
        addMessage(data.reply, false, true);
    } catch (err) {
        addMessage('Error loading menu.', false, true);
    }

    if (voiceMode && wasListening && !isSpeaking) {
        setTimeout(() => startListening(), 500);
    }
}

async function getHint() {
    const wasListening = isListening;
    if (wasListening) stopListening();

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'hint' })
        });
        const data = await response.json();
        addMessage(data.reply, false, true);
    } catch (err) {
        addMessage('Error getting hint.', false, true);
    }

    if (voiceMode && wasListening && !isSpeaking) {
        setTimeout(() => startListening(), 500);
    }
}

async function resetChat() {
    const wasListening = isListening;
    if (wasListening) stopListening();

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'reset' })
        });
        const data = await response.json();
        chatBox.innerHTML = '';
        addMessage(data.reply, false, true);
    } catch (err) {
        console.error(err);
    }

    if (voiceMode && wasListening && !isSpeaking) {
        setTimeout(() => startListening(), 500);
    }
}

// ========== LOAD LESSONS ==========
async function loadCourses() {
    try {
        const res = await fetch('/courses');
        const data = await res.json();
        coursesData = data.conversations || [];
        renderLessons();
        renderPronunciation();
    } catch (err) {
        console.error(err);
        const container = document.getElementById('lessons-container');
        if (container) container.innerHTML = '<div class="lesson-card">Error loading lessons</div>';
    }
}

function renderLessons() {
    const container = document.getElementById('lessons-container');
    if (!container) return;
    container.innerHTML = '';
    if (!coursesData.length) {
        container.innerHTML = '<div class="lesson-card">No lessons available</div>';
        return;
    }

    coursesData.forEach((lesson, idx) => {
        const card = document.createElement('div');
        card.className = 'lesson-card';
        const safeTitle = escapeHtml(lesson.title);
        const safeContent = escapeHtml(lesson.content || 'No content available').replace(/\n/g, '<br>');
        card.innerHTML = `
            <h3>${safeTitle}</h3>
            <div class="content">${safeContent}</div>
            <div class="audio-bar">
                <button onclick="speak('${escapeHtml(lesson.content || '').replace(/'/g, "\\'").replace(/\n/g, ' ')}')">🎧 Listen Full Lesson</button>
                <button class="secondary" onclick="repeatRandomPhrase(${idx})">🔄 Repeat Random Phrase</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function repeatRandomPhrase(idx) {
    const lesson = coursesData[idx];
    if (!lesson || !lesson.content) return;
    const sentences = lesson.content.split(/[.!?]+/).filter(s => s.trim().length > 10);
    if (sentences.length) {
        const randomPhrase = sentences[Math.floor(Math.random() * sentences.length)].trim() + '.';
        speak(randomPhrase);
    } else {
        speak(lesson.content.substring(0, 200));
    }
}

async function recordPhrase(targetPhrase, idx) {
    const SpeechRecog = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecog) {
        alert('Recording not supported in this browser.');
        return;
    }

    const granted = await checkMicrophonePermission();
    if (!granted) {
        const feedback = document.getElementById(`pron-feedback-${idx}`);
        if (feedback) {
            feedback.innerHTML = '❌ Microphone permission denied. Please allow access.';
            feedback.style.color = '#ef4444';
        }
        return;
    }

    const feedback = document.getElementById(`pron-feedback-${idx}`);
    if (!feedback) return;

    feedback.innerHTML = '🎤 Listening... Please speak clearly.';
    feedback.style.color = '#ffd700';

    const rec = new SpeechRecog();
    rec.lang = 'en-US';
    rec.continuous = false;
    rec.interimResults = false;

    rec.onresult = (e) => {
        const user = e.results[0][0].transcript;
        const target = targetPhrase.toLowerCase().replace(/[^\w\s]/g, '');
        const userClean = user.toLowerCase().replace(/[^\w\s]/g, '');

        let correct = 0;
        const targetWords = target.split(/\s+/);
        const userWords = userClean.split(/\s+/);

        targetWords.forEach((w, i) => {
            if (userWords[i] && userWords[i] === w) correct++;
        });

        let acc = Math.round((correct / targetWords.length) * 100);
        if (isNaN(acc)) acc = 0;

        let stars = acc >= 90 ? '⭐⭐⭐' : (acc >= 70 ? '⭐⭐' : '⭐');
        let comment = acc >= 90 ? 'Excellent!' : (acc >= 70 ? 'Good job!' : 'Try again.');
        let color = acc >= 90 ? '#10b981' : (acc >= 70 ? '#ffd700' : '#ef4444');

        feedback.innerHTML = `📝 You said: "${escapeHtml(user)}"<br>📊 Accuracy: ${stars} (${acc}%)<br>💡 ${comment}<br>🎯 Target: "${escapeHtml(targetPhrase)}"`;
        feedback.style.color = color;
    };

    rec.onerror = (event) => {
        console.error('Record error:', event.error);
        let errorMsg = '❌ Recording error';
        if (event.error === 'no-speech') errorMsg = '❌ No speech detected. Please speak clearly.';
        else if (event.error === 'not-allowed') {
            errorMsg = '❌ Microphone permission denied.';
            micPermissionGranted = false;
        }
        feedback.innerHTML = errorMsg;
        feedback.style.color = '#ef4444';
    };

    rec.onend = () => {
        if (feedback.innerHTML === '🎤 Listening... Please speak clearly.') {
            feedback.innerHTML = '❌ No speech detected. Please try again.';
            feedback.style.color = '#ef4444';
        }
    };

    rec.start();
}
