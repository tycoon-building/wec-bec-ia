<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"WEC-BEC English AI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            background:url('static/images/photo2.jpg') no-repeat center center fixed;
            background-size:cover;
            position:relative;
        }

        body::before {
            content:'';
            position:fixed;
            inset:0;
            background:rgba(30,41,59,0.6);
            z-index:0;
        }

        .container {
            position:relative;
            z-index:1;
            max-width:720px;
            width:100%;
            background:rgba(255,255,255,0.9);
            backdrop-filter:blur(12px);
            border-radius:28px;
            box-shadow:0 30px 80px rgba(0,0,0,0.25);
            overflow:hidden;
        }

        /* HEADER */
        .header {
            background:linear-gradient(135deg,#1e293b,#2a3b54);
            color:white;
            padding:18px 20px;
            display:flex;
            align-items:center;
            gap:16px;
            position:relative;
        }

        .header-logo {
            width:42px;
            height:42px;
            border-radius:10px;
        }

        .header-text h1 {
            font-size:20px;
            font-weight:600;
        }

        .header-text p {
            font-size:13px;
            opacity:0.75;
        }

        /* LOGOUT FIX IMPORTANT */
        .logout-btn {
            margin-left:auto;
            background:#ef4444;
            color:white;
            text-decoration:none;
            padding:8px 14px;
            border-radius:30px;
            font-size:13px;
            font-weight:600;
            transition:0.3s;
            white-space:nowrap;
        }

        .logout-btn:hover {
            background:#dc2626;
            transform:scale(1.05);
        }

        /* CHAT */
        #chat {
            height:420px;
            overflow-y:auto;
            padding:20px;
        }

        .msg {
            margin:12px 0;
            padding:12px 16px;
            border-radius:16px;
            max-width:85%;
            line-height:1.5;
        }

        .user {
            background:#dbeafe;
            margin-left:auto;
        }

        .bot {
            background:white;
            border:1px solid #e2e8f0;
        }

        /* INPUT */
        .zone {
            display:flex;
            gap:10px;
            padding:16px;
            border-top:1px solid #eee;
            flex-wrap:wrap;
        }

        .zone input {
            flex:1;
            min-width:180px;
            padding:12px 16px;
            border-radius:30px;
            border:1px solid #ccc;
        }

        .zone button {
            border:none;
            padding:10px 16px;
            border-radius:30px;
            cursor:pointer;
            font-weight:500;
        }

        .btn-send { background:#2563eb; color:white; }
        .btn-mic { background:#ef4444; color:white; }
        .btn-stop { background:#1e293b; color:white; }
    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <img src="static/images/logo.jpg" class="header-logo">

        <div class="header-text">
            <h1>"WEC-BEC English AI</h1>
            <p>Connected as: {{ user }}</p>
        </div>

        <!-- ✅ bouton logout bien placé -->
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <!-- CHAT -->
    <div id="chat"></div>

    <!-- INPUT -->
    <div class="zone">
        <input id="msg" placeholder="Tapez ou parlez en anglais...">
        <button class="btn-send" onclick="sendMessage()">Send</button>
        <button class="btn-mic" onclick="startVoice()">Speak</button>
        <button class="btn-stop" onclick="stopVoice()">Stop</button>
    </div>

</div>

<script>
let voiceMode = false;
let recognition = null;
let speaking = false;
let isListening = false;

function speak(text) {

    // stop ancien audio
    window.speechSynthesis.cancel();

    speaking = true;

    let speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";
    speech.rate = 0.9;
    speech.pitch = 1.1;

    // ===== VOIX FEMME =====
    let voices = window.speechSynthesis.getVoices();

    let femaleVoice = voices.find(v =>
        v.lang.includes("en") &&
        (
            v.name.includes("Female") ||
            v.name.includes("Samantha") ||
            v.name.includes("Google US English") ||
            v.name.includes("Zira") ||
            v.name.includes("Jenny")
        )
    );

    if (femaleVoice) {
        speech.voice = femaleVoice;
    }

    speech.onstart = () => {

        // stop micro pendant parole
        if (recognition && isListening) {
            recognition.stop();
            isListening = false;
        }
    };

    speech.onend = () => {

        speaking = false;

        // reprendre écoute après réponse
        if (voiceMode) {
            setTimeout(() => {
                startListening();
            }, 500);
        }
    };

    window.speechSynthesis.speak(speech);
}

async function sendMessage(textFromVoice = null) {

    let input = document.getElementById("msg");

    let message = textFromVoice ?? input.value;

    if (!message.trim()) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
        <div class="msg user">
            <b>You:</b> ${message}
        </div>
    `;

    input.value = "";

    chat.scrollTop = chat.scrollHeight;

    try {

        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        let data = await res.json();

        chat.innerHTML += `
            <div class="msg bot">
                <b>Teacher:</b> ${data.reply}
            </div>
        `;

        chat.scrollTop = chat.scrollHeight;

        speak(data.reply);

    } catch (err) {

        chat.innerHTML += `
            <div class="msg bot">
                <b>Error:</b> Server problem.
            </div>
        `;
    }
}

function startListening() {

    if (speaking) return;

    if (isListening) return;

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    recognition = new SpeechRecognition();

    recognition.lang = "en-US";

    recognition.continuous = true;

    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        console.log("Listening...");
    };

    recognition.onresult = async (e) => {

        let text =
            e.results[e.results.length - 1][0].transcript;

        console.log("You said:", text);

        recognition.stop();

        isListening = false;

        await sendMessage(text);
    };

    recognition.onerror = (e) => {

        console.log("Recognition error:", e.error);

        isListening = false;

        if (voiceMode) {
            setTimeout(() => {
                startListening();
            }, 1000);
        }
    };

    recognition.onend = () => {

        isListening = false;

        // relance seulement si pas en train de parler
        if (voiceMode && !speaking) {

            setTimeout(() => {
                startListening();
            }, 500);
        }
    };

    recognition.start();
}

function startVoice() {

    voiceMode = true;

    startListening();
}

function stopVoice() {

    voiceMode = false;

    if (recognition) {
        recognition.stop();
    }

    isListening = false;

    speaking = false;

    window.speechSynthesis.cancel();
}
</script>
</body>
</html>
