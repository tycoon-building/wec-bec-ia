<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEC-BEC English AI – Learn with Audio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            position: relative;
        }

        .app {
            width: 100%;
            max-width: 820px;
            height: 96vh;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(14px);
            border-radius: 34px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
        }

        /* ---------- HEADER ---------- */
        .header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .header-logo {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .header-text {
            flex: 1;
            min-width: 140px;
        }
        .header-text h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .header-text p {
            font-size: 12px;
            opacity: 0.75;
            margin-top: 1px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .streak-badge {
            background: linear-gradient(135deg, #f97316, #f59e0b);
            color: #0f172a;
            padding: 6px 14px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 12px rgba(249, 115, 22, 0.3);
        }

        .logout-btn {
            background: #ef4444;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
        }
        .logout-btn:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        /* ---------- NAVIGATION ---------- */
        .nav {
            display: flex;
            background: #f1f5f9;
            border-bottom: 1px solid #e2e8f0;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .nav button {
            flex: 1;
            min-width: 80px;
            padding: 12px 10px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 14px;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
        }
        .nav button.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
            background: rgba(37, 99, 235, 0.05);
        }
        .nav button:hover:not(.active) {
            color: #0f172a;
        }

        /* ---------- MAIN CONTENT ---------- */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 20px 22px;
            scroll-behavior: smooth;
        }
        .main::-webkit-scrollbar {
            width: 5px;
        }
        .main::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
        }

        .section {
            display: none;
            animation: fadeUp 0.3s ease;
        }
        .section.active {
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ---------- CHAT (section) ---------- */
        #chat-box {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 16px;
        }

        .msg {
            padding: 14px 18px;
            border-radius: 20px;
            line-height: 1.6;
            max-width: 92%;
            font-size: 15px;
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            margin-left: auto;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            border-bottom-right-radius: 8px;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        }
        .msg.bot {
            background: white;
            border: 1px solid #e2e8f0;
            color: #0f172a;
            border-bottom-left-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .chat-input-area input {
            flex: 1;
            min-width: 180px;
            border: none;
            outline: none;
            padding: 14px 18px;
            border-radius: 999px;
            background: #f1f5f9;
            font-size: 15px;
            transition: 0.2s;
        }
        .chat-input-area input:focus {
            background: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .chat-input-area button {
            border: none;
            border-radius: 999px;
            padding: 12px 16px;
            cursor: pointer;
            font-weight: 600;
            min-height: 48px;
            transition: 0.2s;
            font-size: 13px;
        }
        .chat-input-area button:hover {
            transform: translateY(-1px);
        }
        .btn-send {
            background: #2563eb;
            color: white;
        }
        .btn-mic {
            background: #ef4444;
            color: white;
        }
        .btn-stop {
            background: #0f172a;
            color: white;
        }

        .status {
            font-size: 13px;
            color: #64748b;
            padding: 6px 0 0 0;
        }

        /* ---------- LESSONS SECTION ---------- */
        .lesson-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 20px 22px;
            margin-bottom: 18px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.04);
            transition: 0.2s;
        }
        .lesson-card:hover {
            box-shadow: 0 6px 28px rgba(0,0,0,0.08);
        }
        .lesson-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .lesson-card .meta {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .lesson-card p {
            font-size: 15px;
            line-height: 1.6;
            color: #1e293b;
            margin-bottom: 14px;
        }
        .lesson-card .audio-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .audio-bar button {
            border: none;
            background: #2563eb;
            color: white;
            padding: 8px 18px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .audio-bar button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .audio-bar button.secondary {
            background: #f1f5f9;
            color: #0f172a;
            border: 1px solid #e2e8f0;
        }
        .audio-bar button.secondary:hover {
            background: #e2e8f0;
        }

        .lesson-progress {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            font-size: 13px;
            color: #475569;
        }
        .lesson-progress .bar {
            flex: 1;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .lesson-progress .bar span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, #2563eb, #3b82f6);
            border-radius: 10px;
            width: 0%;
        }

        /* ---------- PRONUNCIATION SECTION ---------- */
        .pron-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 18px;
            padding: 20px 22px;
            margin-bottom: 18px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.04);
        }
        .pron-card h3 {
            font-size: 18px;
            margin-bottom: 6px;
        }
        .pron-card .phrase {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin: 8px 0 12px;
        }
        .pron-card .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pron-card .actions button {
            border: none;
            padding: 10px 22px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .pron-card .actions .btn-listen {
            background: #0f172a;
            color: white;
        }
        .pron-card .actions .btn-record {
            background: #ef4444;
            color: white;
        }
        .pron-card .actions .btn-record:hover {
            background: #dc2626;
        }
        .pron-card .actions .btn-listen:hover {
            background: #1e293b;
        }

        .pron-feedback {
            margin-top: 14px;
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: 14px;
            border-left: 4px solid #2563eb;
            font-size: 14px;
            line-height: 1.6;
            color: #1e293b;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 768px) {
            body { padding: 0; }
            .app {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }
            .header { padding: 12px 16px; }
            .header-logo { width: 40px; height: 40px; }
            .header-text h1 { font-size: 17px; }
            .nav button { font-size: 12px; padding: 10px 6px; min-width: 60px; }
            .main { padding: 14px 14px; }
            .chat-input-area { flex-direction: column; }
            .chat-input-area input { width: 100%; }
            .chat-input-area button { width: 100%; }
            .lesson-card, .pron-card { padding: 16px; }
            .pron-card .phrase { font-size: 18px; }
            .header-right { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <img src="static/images/logo.jpg" class="header-logo" alt="logo">
        <div class="header-text">
            <h1>WEC‑BEC English AI</h1>
            <p>Connected as: {{ user }}</p>
        </div>
        <div class="header-right">
            <div class="streak-badge">🔥 7 day streak</div>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="nav">
        <button class="active" data-section="chat">💬 Chat</button>
        <button data-section="lessons">📚 Lessons</button>
        <button data-section="pronunciation">🗣️ Pronunciation</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- ===== CHAT SECTION ===== -->
        <div id="section-chat" class="section active">
            <div id="chat-box"></div>
            <div class="status" id="status">Ready 🎤</div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type or speak in English..." autocomplete="off">
                <button class="btn-send" onclick="sendMessage()">Send</button>
                <button class="btn-mic" onclick="startVoice()">🎤 Speak</button>
                <button class="btn-stop" onclick="stopVoice()">⏹ Stop</button>
            </div>
        </div>

        <!-- ===== LESSONS SECTION ===== -->
        <div id="section-lessons" class="section">
            <h2 style="font-size:20px; font-weight:700; margin-bottom:6px;">📘 Audio Lessons</h2>
            <p style="color:#64748b; margin-bottom:18px;">Auto‑generated voice for every lesson. Listen, repeat, learn.</p>

            <div id="lessons-container">
                <!-- will be populated by JS -->
            </div>
        </div>

        <!-- ===== PRONUNCIATION SECTION ===== -->
        <div id="section-pronunciation" class="section">
            <h2 style="font-size:20px; font-weight:700; margin-bottom:6px;">🗣️ Pronunciation Coach</h2>
            <p style="color:#64748b; margin-bottom:18px;">Listen to the phrase, then record yourself. Get instant feedback.</p>

            <div id="pron-container">
                <!-- will be populated by JS -->
            </div>
        </div>

    </div><!-- .main -->

</div><!-- .app -->

<script>
// ========== NAVIGATION ==========
document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const section = this.dataset.section;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + section).classList.add('active');
    });
});

// ========== CHAT (reutilised from original, slightly enhanced) ==========
let voiceMode = false;
let recognition = null;
let speaking = false;
let isListening = false;
const statusText = document.getElementById('status');
function setStatus(text) { if(statusText) statusText.innerText = text; }

function getHumanVoice() {

    const voices =
        speechSynthesis.getVoices();

    return (
        voices.find(v => v.name.includes('Microsoft Aria'))
        || voices.find(v => v.name.includes('Microsoft Jenny'))
        || voices.find(v => v.name.includes('Google US English'))
        || voices.find(v => v.name.includes('Samantha'))
        || voices.find(v => v.name.includes('Zira'))
        || voices.find(v => v.lang.startsWith('en'))
    );
}

function speak(text) {

    window.speechSynthesis.cancel();

    const speech =
        new SpeechSynthesisUtterance(text);

    speech.lang = "en-US";

    speech.voice = getHumanVoice();

    speech.rate = 0.95;

    speech.pitch = 1.0;

    speech.volume = 1;

    speech.onboundary = () => {
        // rythme plus humain
    };

    speechSynthesis.speak(speech);
}

async function sendMessage(textFromVoice = null) {
    const input = document.getElementById('msg');
    const message = textFromVoice ?? input.value;
    if (!message.trim()) return;
    const chat = document.getElementById('chat-box');
    chat.innerHTML += `<div class="msg user"><b>You:</b> ${message}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    setStatus('Thinking... 🤖');
    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });
        const data = await res.json();
        chat.innerHTML += `<div class="msg bot"><b>Teacher:</b> ${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;
        speak(data.reply);
    } catch (err) {
        chat.innerHTML += `<div class="msg bot"><b>Error:</b> Server problem.</div>`;
        setStatus('Connection error ❌');
    }
}

function startListening() {
    if (speaking || isListening) return;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition not supported.'); return; }
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => { isListening = true; setStatus('Listening... 🎤'); };
    recognition.onresult = async (e) => {
        const text = e.results[0][0].transcript;
        recognition.stop(); isListening = false;
        await sendMessage(text);
    };
    recognition.onerror = (e) => {
        console.log(e.error);
        isListening = false;
        setStatus('Microphone error ❌');
        if (voiceMode) setTimeout(() => startListening(), 1500);
    };
    recognition.onend = () => {
        isListening = false;
        if (voiceMode && !speaking) setTimeout(() => startListening(), 1000);
    };
    recognition.start();
}

function startVoice() { voiceMode = true; setStatus('Voice mode activated 🎤'); startListening(); }
function stopVoice() {
    voiceMode = false; speaking = false; isListening = false;
    if (recognition) recognition.stop();
    speechSynthesis.cancel();
    setStatus('Voice stopped ⛔');
}

window.speechSynthesis.onvoiceschanged = () => { getHumanVoice(); };

// ========== LESSONS (auto‑generated audio) ==========
let lessonsData = [];

async function loadLessons() {
    try {
        const response = await fetch('/courses');
        const data = await response.json();

        lessonsData = data.courses || data;

        renderLessons();
    } catch (error) {
        console.error("Erreur chargement cours:", error);
    }
}

function renderLessons() {

    const container =
        document.getElementById('lessons-container');

    container.innerHTML = '';

    lessonsData.forEach((lesson, idx) => {

        const card = document.createElement('div');

        card.className = 'lesson-card';

        card.innerHTML = `
            <h3>${lesson.title}</h3>

            <div class="meta">
                ${lesson.level}
            </div>

            <p>
                ${lesson.content || lesson.text}
            </p>

            <div class="audio-bar">
                <button onclick="playLessonAudio(${idx})">
                    🔊 Listen
                </button>

                <button onclick="repeatPhrase(${idx})">
                    🔄 Repeat
                </button>
            </div>
        `;

        container.appendChild(card);
    });
}

function playLessonAudio(idx) {
    const lesson = lessonsData[idx];
    if (!lesson) return;
    speak(lesson.text);
}

function repeatPhrase(idx) {
    const lesson = lessonsData[idx];
    if (!lesson) return;
    // pick a random sentence
    const sentences = lesson.text.split(/[.!?]+/).filter(s => s.trim().length > 0);
    if (sentences.length) {
        const phrase = sentences[Math.floor(Math.random() * sentences.length)].trim() + '.';
        speak(phrase);
    } else {
        speak(lesson.text);
    }
}
// ========== PRONUNCIATION ==========
function pronounceWord(word){

    speak(word);

    setTimeout(() => {

        speak(
          `Repeat after me. ${word}`
        );

    },1500);
}

// ========== PRONUNCIATION ==========
const pronData = [
    { phrase: 'The weather is beautiful today.', tip: 'Focus on the "th" sound — place your tongue between your teeth.' },
    { phrase: 'I would like a cup of coffee, please.', tip: 'Link "would like" — it sounds like "w’d like".' },
    { phrase: 'She works at the hospital every morning.', tip: 'The "s" in "works" is pronounced /s/ after a voiceless consonant.' },
    { phrase: 'Could you tell me where the library is?', tip: 'Rising intonation at the end for polite requests.' },
];

function renderPronunciation() {
    const container = document.getElementById('pron-container');
    container.innerHTML = '';
    pronData.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'pron-card';
        card.innerHTML = `
            <h3>Phrase ${idx+1}</h3>
            <div class="phrase">"${item.phrase}"</div>
            <div class="actions">
                <button class="btn-listen" onclick="listenPhrase(${idx})">🔊 Listen</button>
                <button class="btn-record" onclick="recordPhrase(${idx})">🎤 Record & Compare</button>
            </div>
            <div class="pron-feedback" id="pron-feedback-${idx}">
                <b>💡 Tip:</b> ${item.tip}
            </div>
        `;
        container.appendChild(card);
    });
}

function listenPhrase(idx) {
    const item = pronData[idx];
    if (item) speak(item.phrase);
}

async function recordPhrase(idx) {
    const item = pronData[idx];
    if (!item) return;
    // Use browser speech recognition to capture what the user says, then give feedback
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Recording not supported in this browser.'); return; }
    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;
    const feedbackDiv = document.getElementById(`pron-feedback-${idx}`);
    feedbackDiv.innerHTML = `<b>🎤 Listening...</b>`;
    rec.onresult = (e) => {
        const userText = e.results[0][0].transcript;
        const target = item.phrase.toLowerCase().replace(/[^\w\s]/g, '');
        const user = userText.toLowerCase().replace(/[^\w\s]/g, '');
        const wordsTarget = target.split(/\s+/);
        const wordsUser = user.split(/\s+/);
        let correct = 0;
        wordsTarget.forEach((w, i) => { if (wordsUser[i] === w) correct++; });
        const accuracy = Math.round((correct / wordsTarget.length) * 100);
        let stars = accuracy >= 90 ? '⭐⭐⭐' : accuracy >= 70 ? '⭐⭐' : '⭐';
        let comment = accuracy >= 90 ? 'Excellent! Very clear.' : accuracy >= 70 ? 'Good job! A little more practice.' : 'Keep trying! Focus on the sounds.';
        feedbackDiv.innerHTML = `
            <b>📝 You said:</b> "${userText}"<br>
            <b>🎯 Accuracy:</b> ${stars} (${accuracy}%)<br>
            <b>💡 ${comment}</b><br>
            <b>🔍 Tip:</b> ${item.tip}
        `;
    };
    rec.onerror = () => { feedbackDiv.innerHTML = `<b>❌ Microphone error. Please try again.</b><br><b>💡 Tip:</b> ${item.tip}`; };
    rec.start();
}

// ========== INIT ==========
renderLessons();
renderPronunciation();

// welcome message in chat
document.addEventListener('DOMContentLoaded', () => {
    loadLessons();
    renderPronunciation();
});
</script>

</body>
</html>
