<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WEC-BEC English AI – Your Personal English Tutor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 30%, #1a1a2e 100%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 80%, rgba(59,130,246,0.08) 0%, transparent 50%),
                              radial-gradient(circle at 80% 20%, rgba(168,85,247,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 980px;
            height: 96vh;
            margin: 2vh auto;
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 42px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .header {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-logo {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            overflow: hidden;
        }
        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-text { flex: 1; }
        .header-text h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header-text p { font-size: 12px; color: #94a3b8; margin-top: 2px; }
        .header-text p i { color: #10b981; margin-right: 4px; }

        .streak-badge {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .logout-btn:hover { background: #ef4444; color: white; transform: translateY(-2px); }

        .nav {
            display: flex;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 0 8px;
            gap: 4px;
            overflow-x: auto;
        }
        .nav button {
            flex: 1;
            padding: 14px 12px;
            border: none;
            background: transparent;
            font-weight: 600;
            font-size: 14px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }
        .nav button.active {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.15);
            border-bottom: 2px solid #3b82f6;
        }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            scroll-behavior: smooth;
        }
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .main::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        .section { display: none; animation: fadeInUp 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #chat-box {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        .msg {
            padding: 14px 20px;
            border-radius: 24px;
            line-height: 1.5;
            max-width: 85%;
            font-size: 15px;
            animation: messagePop 0.3s ease;
        }
        @keyframes messagePop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .msg.user {
            margin-left: auto;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .msg.bot {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            border-bottom-left-radius: 6px;
        }

        .chat-input-area {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .chat-input-area input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 20px;
            border-radius: 60px;
            background: rgba(30, 41, 59, 0.9);
            color: white;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .chat-input-area input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .chat-input-area button {
            border: none;
            border-radius: 60px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-send { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-mic { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-mic.listening { background: linear-gradient(135deg, #10b981, #059669); animation: pulse 1s infinite; }
        .btn-stop { background: #0f172a; color: white; }

        .status {
            font-size: 12px;
            color: #94a3b8;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .section-subtitle { color: #94a3b8; margin-bottom: 24px; font-size: 14px; }

        .lesson-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        .lesson-card:hover { transform: translateY(-3px); border-color: rgba(59,130,246,0.3); }
        .lesson-card h3 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
        .lesson-card .meta { font-size: 12px; color: #8b5cf6; margin-bottom: 12px; }
        .lesson-card p { font-size: 14px; line-height: 1.6; color: #cbd5e1; margin-bottom: 14px; }

        .audio-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 16px 0 12px;
        }
        .audio-bar button {
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .audio-bar button.secondary { background: rgba(100, 116, 139, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); }
        .audio-bar button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .lesson-progress {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: #94a3b8;
        }
        .lesson-progress .bar { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .lesson-progress .bar span { display: block; height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 10px; width: 0%; }

        .pron-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 16px;
        }
        .pron-card h3 { font-size: 18px; font-weight: 700; color: white; margin-bottom: 6px; }
        .pron-card .phrase { font-size: 22px; font-weight: 700; color: white; margin: 8px 0 12px; font-style: italic; }
        .pron-card .actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .pron-card .actions button { border: none; padding: 10px 22px; border-radius: 999px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .pron-card .actions .btn-listen { background: #0f172a; color: white; }
        .pron-card .actions .btn-record { background: #ef4444; color: white; }
        .pron-card .actions .btn-record:hover { background: #dc2626; }
        .pron-card .actions .btn-listen:hover { background: #1e293b; }
        .pron-feedback {
            margin-top: 14px;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 14px;
            border-left: 4px solid #3b82f6;
            font-size: 13px;
            line-height: 1.6;
            color: #cbd5e1;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        @media (max-width: 768px) {
            .app { height: 100vh; margin: 0; border-radius: 0; }
            .main { padding: 16px; }
            .msg { max-width: 95%; }
            .nav button { font-size: 11px; }
            .pron-card .phrase { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-logo">
            <img src="static/images/logo.jpg" alt="logo" onerror="this.src='https://placehold.co/50x50/3b82f6/white?text=WEC'">
        </div>
        <div class="header-text">
            <h1>🎓 WEC‑BEC English AI</h1>
            <p><i class="fas fa-circle"></i> Connected as: {{ user }} · Your personal AI tutor</p>
        </div>
        <div class="streak-badge"><i class="fas fa-fire"></i> 7 day streak</div>
        <a href="/logout" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Exit</a>
    </div>

    <div class="nav">
        <button class="active" data-section="chat"><i class="fas fa-comment-dots"></i> Chat</button>
        <button data-section="lessons"><i class="fas fa-book-open"></i> Lessons</button>
        <button data-section="pronunciation"><i class="fas fa-microphone-alt"></i> Pronunciation</button>
    </div>

    <div class="main">
        <div id="section-chat" class="section active">
            <div id="chat-box"></div>
            <div class="status" id="status">Ready 🎤</div>
            <div class="chat-input-area">
                <input id="msg" placeholder="Type or speak in English..." autocomplete="off">
                <button class="btn-send" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Send</button>
                <button class="btn-mic" id="micBtn" onclick="startVoice()"><i class="fas fa-microphone"></i> Speak</button>
                <button class="btn-stop" onclick="stopVoice()"><i class="fas fa-stop"></i> Stop</button>
            </div>
        </div>

        <div id="section-lessons" class="section">
            <h2 class="section-title"><i class="fas fa-book-reader"></i> Audio Lessons</h2>
            <p class="section-subtitle">Auto‑generated voice for every lesson. Listen, repeat, learn.</p>
            <div id="lessons-container"></div>
        </div>

        <div id="section-pronunciation" class="section">
            <h2 class="section-title"><i class="fas fa-microphone-alt"></i> Pronunciation Coach</h2>
            <p class="section-subtitle">Listen to the phrase, then record yourself. Get instant feedback.</p>
            <div id="pron-container"></div>
        </div>
    </div>
</div>

<script>
// ========== NAVIGATION ==========
document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        const section = this.dataset.section;
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + section).classList.add('active');
    });
});

// ========== CHAT (reutilised from original, slightly enhanced) ==========
let voiceMode = false;
let recognition = null;
let speaking = false;
let isListening = false;
const statusText = document.getElementById('status');
function setStatus(text) { if(statusText) statusText.innerText = text; }

function getHumanVoice() {
    const voices = speechSynthesis.getVoices();
    return voices.find(v => v.name.includes('Samantha'))
        || voices.find(v => v.name.includes('Google UK English Female'))
        || voices.find(v => v.name.includes('Microsoft Jenny'))
        || voices.find(v => v.name.includes('Google US English'))
        || voices.find(v => v.name.includes('Zira'))
        || voices.find(v => v.name.includes('Aria'))
        || voices.find(v => v.lang.includes('en'));
}

function speak(text) {
    window.speechSynthesis.cancel();
    speaking = true;
    setStatus('Speaking... 🔊');
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = 'en-US';
    speech.rate = 0.92;
    speech.pitch = 1.05;
    speech.volume = 1;
    const selected = getHumanVoice();
    if (selected) speech.voice = selected;
    speech.onstart = () => { if (recognition && isListening) { recognition.stop(); isListening = false; } };
    speech.onend = () => {
        speaking = false;
        setStatus('Ready 🎤');
        if (voiceMode) setTimeout(() => startListening(), 800);
    };
    speechSynthesis.speak(speech);
}

async function sendMessage(textFromVoice = null) {
    const input = document.getElementById('msg');
    const message = textFromVoice ?? input.value;
    if (!message.trim()) return;
    const chat = document.getElementById('chat-box');
    chat.innerHTML += `<div class="msg user"><i class="fas fa-user"></i> ${escapeHtml(message)}</div>`;
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
    setStatus('Thinking... 🤖');
    try {
        const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });
        const data = await res.json();
        chat.innerHTML += `<div class="msg bot"><i class="fas fa-robot"></i> ${escapeHtml(data.reply)}</div>`;
        chat.scrollTop = chat.scrollHeight;
        speak(data.reply);
    } catch (err) {
        chat.innerHTML += `<div class="msg bot"><i class="fas fa-exclamation-triangle"></i> Error: Server problem.</div>`;
        setStatus('Connection error ❌');
    }
}

function startListening() {
    if (speaking || isListening) return;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Speech recognition not supported.'); return; }
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.onstart = () => { isListening = true; setStatus('Listening... 🎤'); };
    recognition.onresult = async (e) => {
        const text = e.results[0][0].transcript;
        recognition.stop(); isListening = false;
        document.getElementById('msg').value = text;
        await sendMessage(text);
    };
    recognition.onerror = (e) => {
        console.log(e.error);
        isListening = false;
        setStatus('Microphone error ❌');
        if (voiceMode) setTimeout(() => startListening(), 1500);
    };
    recognition.onend = () => {
        isListening = false;
        if (voiceMode && !speaking) setTimeout(() => startListening(), 1000);
    };
    recognition.start();
}

function startVoice() {
    voiceMode = true;
    setStatus('Voice mode activated 🎤');
    startListening();
    const micBtn = document.getElementById('micBtn');
    if (micBtn) micBtn.classList.add('listening');
}
function stopVoice() {
    voiceMode = false;
    speaking = false;
    isListening = false;
    if (recognition) recognition.stop();
    speechSynthesis.cancel();
    setStatus('Voice stopped ⛔');
    const micBtn = document.getElementById('micBtn');
    if (micBtn) micBtn.classList.remove('listening');
}

function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
        return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;';
    });
}

window.speechSynthesis.onvoiceschanged = () => { getHumanVoice(); };

// ========== LESSONS (chargement depuis courses.json) ==========
let coursesData = [];

async function loadCourses() {
    try {
        const response = await fetch('/courses');
        const data = await response.json();
        coursesData = data.conversations || [];
        renderLessons();
        renderPronunciation();
    } catch (error) {
        console.error('Erreur chargement courses.json:', error);
        document.getElementById('lessons-container').innerHTML =
            '<div class="lesson-card"><p>❌ Error loading lessons. Please check courses.json file.</p></div>';
    }
}

function getLessonLevel(title) {
    if (title.includes('A1') || title.includes('Beginner') || (title.match(/Lesson [1-5]/))) return 'Beginner · A1';
    if (title.includes('A2')) return 'Elementary · A2';
    if (title.includes('B1')) return 'Intermediate · B1';
    if (title.includes('B2')) return 'Upper Intermediate · B2';
    return 'All levels';
}

function renderLessons() {
    const container = document.getElementById('lessons-container');
    container.innerHTML = '';

    if (coursesData.length === 0) {
        container.innerHTML = '<div class="lesson-card"><p>📚 No lessons available at the moment.</p></div>';
        return;
    }

    coursesData.forEach((lesson, idx) => {
        const card = document.createElement('div');
        card.className = 'lesson-card';

        let previewText = lesson.content || '';
        if (previewText.length > 150) previewText = previewText.substring(0, 150) + '...';

        card.innerHTML = `
            <h3>${escapeHtml(lesson.title)}</h3>
            <div class="meta">Lesson ${idx+1} · ${getLessonLevel(lesson.title)}</div>
            <p>${escapeHtml(previewText)}</p>
            <div class="audio-bar">
                <button onclick="playLessonAudio(${idx})"><i class="fas fa-headphones"></i> Listen to Lesson</button>
                <button class="secondary" onclick="repeatLessonPhrase(${idx})"><i class="fas fa-redo-alt"></i> Repeat phrase</button>
            </div>
            <div class="lesson-progress">
                <i class="fas fa-chart-line"></i>
                <div class="bar"><span style="width:${Math.min((idx+1) * (100/coursesData.length), 100)}%"></span></div>
                <span>${Math.round((idx+1) / coursesData.length * 100)}%</span>
            </div>
        `;
        container.appendChild(card);
    });
}

function playLessonAudio(idx) {
    const lesson = coursesData[idx];
    if (!lesson) return;
    speak(lesson.content || lesson.title);
}

function repeatLessonPhrase(idx) {
    const lesson = coursesData[idx];
    if (!lesson) return;
    const content = lesson.content || '';
    const sentences = content.split(/[.!?]+/).filter(s => s.trim().length > 10);
    if (sentences.length) {
        const phrase = sentences[Math.floor(Math.random() * sentences.length)].trim() + '.';
        speak(phrase);
    } else {
        speak(content.substring(0, 200));
    }
}

// ========== PRONUNCIATION (à partir des leçons chargées) ==========
function renderPronunciation() {
    const container = document.getElementById('pron-container');
    container.innerHTML = '';

    if (coursesData.length === 0) {
        container.innerHTML = '<div class="pron-card"><p>🎙️ Select a lesson to practice pronunciation.</p></div>';
        return;
    }

    // Prendre les 12 premières leçons pour la prononciation
    const pronLessons = coursesData.slice(0, 12);

    pronLessons.forEach((lesson, idx) => {
        let phrase = lesson.content || '';
        const firstSentence = phrase.split(/[.!?]/)[0];
        phrase = firstSentence.length > 30 ? firstSentence.substring(0, 80) : (phrase.substring(0, 80) || lesson.title);

        const card = document.createElement('div');
        card.className = 'pron-card';
        card.innerHTML = `
            <h3>From: ${escapeHtml(lesson.title)}</h3>
            <div class="phrase">"${escapeHtml(phrase)}..."</div>
            <div class="actions">
                <button class="btn-listen" onclick="listenPronPhrase('${escapeHtml(phrase).replace(/'/g, "\\'")}')"><i class="fas fa-play"></i> Listen</button>
                <button class="btn-record" onclick="recordPronPhrase('${escapeHtml(phrase).replace(/'/g, "\\'")}', ${idx})"><i class="fas fa-microphone"></i> Record & Compare</button>
            </div>
            <div class="pron-feedback" id="pron-feedback-${idx}">
                <i class="fas fa-lightbulb"></i> <strong>Tip:</strong> Listen carefully and try to repeat exactly.
            </div>
        `;
        container.appendChild(card);
    });
}

function listenPronPhrase(phrase) {
    speak(phrase);
}

async function recordPronPhrase(targetPhrase, idx) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('Recording not supported in this browser.'); return; }

    const rec = new SpeechRecognition();
    rec.lang = 'en-US';
    rec.interimResults = false;
    rec.maxAlternatives = 1;

    const feedbackDiv = document.getElementById(`pron-feedback-${idx}`);
    if (!feedbackDiv) return;

    feedbackDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> Listening... 🎤`;

    rec.onresult = (e) => {
        const userText = e.results[0][0].transcript;
        const target = targetPhrase.toLowerCase().replace(/[^\w\s]/g, '');
        const user = userText.toLowerCase().replace(/[^\w\s]/g, '');

        const wordsTarget = target.split(/\s+/);
        const wordsUser = user.split(/\s+/);
        let correct = 0;
        wordsTarget.forEach((w, i) => { if (wordsUser[i] === w) correct++; });
        const accuracy = Math.round((correct / wordsTarget.length) * 100);

        let stars = accuracy >= 90 ? '⭐⭐⭐' : accuracy >= 70 ? '⭐⭐' : '⭐';
        let comment = accuracy >= 90 ? 'Excellent! Very clear pronunciation.' :
                      accuracy >= 70 ? 'Good job! A little more practice.' :
                      'Keep trying! Focus on the sounds.';

        feedbackDiv.innerHTML = `
            <i class="fas fa-comment-dots"></i> <strong>You said:</strong> "${escapeHtml(userText)}"<br>
            <i class="fas fa-chart-simple"></i> <strong>Accuracy:</strong> ${stars} (${accuracy}%)<br>
            <i class="fas fa-smile-wink"></i> ${comment}<br>
            <i class="fas fa-lightbulb"></i> <strong>Target:</strong> "${escapeHtml(targetPhrase)}"
        `;
    };

    rec.onerror = () => {
        feedbackDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Microphone error. Please try again.<br><i class="fas fa-lightbulb"></i> <strong>Target:</strong> "${escapeHtml(targetPhrase)}"`;
    };

    rec.start();
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
    loadCourses();
    const chat = document.getElementById('chat-box');
    const userName = document.querySelector('.header-text p')?.innerText?.replace('Connected as: ', '').replace(' · Your personal AI tutor', '') || 'student';
    chat.innerHTML = `<div class="msg bot"><i class="fas fa-robot"></i> Hello ${escapeHtml(userName)}! I'm your AI tutor. Ask me anything or choose a lesson from the menu. 🚀</div>`;
});
</script>
